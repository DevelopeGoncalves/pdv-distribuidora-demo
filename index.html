  <script>

        { id: "p35", nome: "Wemix", preco: 6.00, estoque: 50, categoria: "Bebidas", imagem: "img/wemix.png" }, // Parado

        { id: "p37", nome: "Espetinho", preco: 8.00, estoque: 100, categoria: "Comida", imagem: "img/espetinho.jpg" }
    ];

    // Produtos que vão vender (excluímos propositalmente alguns para ficarem encalhados)
    const prodsGirando = defaultProdutos.filter(p => !["Água Tônica Schweppes", "Ice 51", "Itaipava Mega Latão", "Wemix"].includes(p.nome));

    // GERADOR MASSIVO DE VENDAS
    const mockVendas = [];
    const metodos = ["Dinheiro", "Pix", "Pix", "Pix", "Débito", "Crédito", "Fiado"]; 
    const origens = ["Balcão Distribuidora", "WhatsApp/Entrega", "Atacado Especial"];
    
    for(let i = 0; i < 500; i++) {
        const diasAtras = Math.floor(Math.random() * 90);
        const dataVenda = new Date(); dataVenda.setDate(dataVenda.getDate() - diasAtras);
        const numItens = 1 + Math.floor(Math.random() * 5); 
        const itensVenda = []; let totalVenda = 0;
        
        for(let j = 0; j < numItens; j++) {
            const prod = prodsGirando[Math.floor(Math.random() * prodsGirando.length)];
            const qtd = 12 + Math.floor(Math.random() * 100); 
            itensVenda.push({ id: prod.id, nome: prod.nome, preco: prod.preco, quantidade: qtd });
            totalVenda += (prod.preco * qtd);
        }
        
        const metodo = metodos[Math.floor(Math.random() * metodos.length)];
        mockVendas.push({
            id: `v_gen_${i}`, data: dataVenda.toISOString(), total: totalVenda,

    // BASTANTE AVARIAS
    const mockAvarias = [
        { id: "av1", data: iso(2), produtoId: "p19", produtoNome: "Heineken 600ml", qtd: 12, motivo: "Engradado caiu no estoque", valorPerdido: 192.00, usuario: "vitrine@victorino.com" },

        { id: "av3", data: iso(10), produtoId: "p37", produtoNome: "Espetinho", qtd: 15, motivo: "Vencido / Estragado", valorPerdido: 120.00, usuario: "vitrine@victorino.com" },
        { id: "av4", data: iso(12), produtoId: "p11", produtoNome: "Budweiser Latão", qtd: 6, motivo: "Amassada na entrega", valorPerdido: 39.00, usuario: "vitrine@victorino.com" },
        { id: "av5", data: iso(18), produtoId: "p34", produtoNome: "Vodka Absolut", qtd: 1, motivo: "Roubo / Furto", valorPerdido: 120.00, usuario: "vitrine@victorino.com" },
        { id: "av6", data: iso(25), produtoId: "p3", produtoNome: "Água Tônica Schweppes", qtd: 24, motivo: "Vencido / Estragado", valorPerdido: 120.00, usuario: "vitrine@victorino.com" },
        { id: "av7", data: iso(30), produtoId: "p1", produtoNome: "Água S/ Gás", qtd: 5, motivo: "Consumo Próprio", valorPerdido: 15.00, usuario: "vitrine@victorino.com" }
    ];

    // 5 CLIENTES NO FIADO
    const mockFiados = [
        { id: "f1", nome: "Bar do Zé (Revenda)", saldoDevedor: 1450.00, historico: [{ data: iso(5), tipo: "COMPRA", valor: 1450.00, itens: "100x Heineken Latão" }] },
        { id: "f2", nome: "Depósito Avenida", saldoDevedor: 890.00, historico: [{ data: iso(12), tipo: "COMPRA", valor: 890.00, itens: "Mix de Cervejas" }] },
        { id: "f3", nome: "Mecânica do João", saldoDevedor: 120.00, historico: [{ data: iso(2), tipo: "COMPRA", valor: 120.00, itens: "Fardo de Coca e Espetinhos" }] },
        { id: "f4", nome: "Dona Maria (Salgados)", saldoDevedor: 45.50, historico: [{ data: iso(20), tipo: "COMPRA", valor: 45.50, itens: "Refrigerantes" }] },
        { id: "f5", nome: "Construtora Silva", saldoDevedor: 3200.00, historico: [{ data: iso(1), tipo: "COMPRA", valor: 3500.00, itens: "Bebidas para festa da firma" }, { data: iso(0), tipo: "PAGAMENTO", valor: 300.00 }] }
    ];

    const mockPedidos = [
        { id: "ped1", data: iso(0), nomeCliente: "Mesa 01", total: 180.00, status: "Pendente", tipo: "Mesa", vendedor: "vitrine@victorino.com", itens: [{ id: "p5", nome: "Amstel 600ml", preco: 12, quantidade: 15 }] },
        { id: "ped2", data: iso(0), nomeCliente: "Mesa 05", total: 45.00, status: "Pronto", tipo: "Mesa", vendedor: "vitrine@victorino.com", itens: [{ id: "p9", nome: "Brahma Lata", preco: 4.50, quantidade: 10 }] }
    ];

    function getDB() {
        let db = JSON.parse(localStorage.getItem(DB_KEY));
        if (!db) {
            db = { produtos: defaultProdutos, vendas: mockVendas, comandas: [], fiados: mockFiados, avarias: mockAvarias, pedidos: mockPedidos, users: [{ id: '1', username: 'vitrine@victorino.com', password: '123456', role: 'admin' }] };
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }
        return db;
    }

    function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); window.dispatchEvent(new Event('localDBChange')); }

    window.db = "dummy_db";
    window.firebaseMethods = {
        collection: (db, name) => name, doc: (db, colName, id) => ({ colName, id }),
        addDoc: async (colName, data) => { let db = getDB(); if(!db[colName]) db[colName] = []; let id = Date.now().toString(); db[colName].push({ ...data, id }); saveDB(db); return { id }; },
        updateDoc: async (docRef, data) => { let db = getDB(); let items = db[docRef.colName]; let idx = items.findIndex(i => i.id === docRef.id); if(idx > -1) { items[idx] = { ...items[idx], ...data }; saveDB(db); } },
        deleteDoc: async (docRef) => { let db = getDB(); db[docRef.colName] = db[docRef.colName].filter(i => i.id !== docRef.id); saveDB(db); },
        onSnapshot: (colName, callback) => { const emit = () => { let db = getDB(); let docs = (db[colName] || []).map(item => ({ id: item.id, data: () => item })); callback({ docs }); }; emit(); window.addEventListener('storage', (e) => { if (e.key === DB_KEY) emit(); }); window.addEventListener('localDBChange', emit); return () => { window.removeEventListener('storage', emit); window.removeEventListener('localDBChange', emit); }; },
        auth: {},
        signInWithEmailAndPassword: async (auth, email, pass) => { let db = getDB(); let user = db.users.find(u => u.username === email && u.password === pass); if(!user) throw new Error("Inválido"); localStorage.setItem('loggedUser', JSON.stringify(user)); window.dispatchEvent(new Event('authStateChange')); },
        signOut: async () => { localStorage.removeItem('loggedUser'); window.dispatchEvent(new Event('authStateChange')); },
        onAuthStateChanged: (auth, callback) => { const emit = () => { let u = localStorage.getItem('loggedUser'); callback(u ? { email: JSON.parse(u).username, uid: JSON.parse(u).id } : null); }; emit(); window.addEventListener('authStateChange', emit); return () => window.removeEventListener('authStateChange', emit); }
    };
  </script>

    /* ESTILOS DE IMPRESSÃO */

    .mesa-card {

<body class="bg-gray-100 h-screen overflow-hidden text-gray-800">

  <div id="root" class="h-full"></div>

  <script type="text/babel">
  const { useState, useEffect, useMemo, useRef } = React;

  /* ================= UTILS & CONFIG ================= */
  const CATEGORIAS_PADRAO = ["Bebidas", "Comida", "Cigarros", "Diversos", "Outros"];

  function uid(){ return Date.now() + Math.floor(Math.random()*9999); }
  
  function currency(v){ 
    return Number(v||0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  /*********************
   * Mapa de Mesas View
   *********************/
  /*********************
   * Mapa de Mesas View
   *********************/
  function MapaMesasView({ pedidos, selecionarMesa }) {
    // 50 Fichas/Mesas
    const mesas = Array.from({length: 50}, (_, i) => {
        const num = i + 1;
        const nomeMesa = `Mesa ${num < 10 ? '0'+num : num}`;
        
        const pedidosMesa = pedidos.filter(p => 
            p.status !== 'Vendido' && 
            p.nomeCliente &&
            p.nomeCliente.toLowerCase() === nomeMesa.toLowerCase()
        );

        const total = pedidosMesa.reduce((acc, p) => acc + p.total, 0);
        const ocupada = pedidosMesa.length > 0;
        
        const status = ocupada ? (pedidosMesa.some(p => p.status === 'Pronto') ? 'pagamento' : 'ocupada') : 'livre';

        return { num, nome: nomeMesa, status, total, pedidos: pedidosMesa };
    });

    return (
        <div className="p-6 bg-slate-50 min-h-full animate-fade-in w-full max-w-[1600px] mx-auto">
            <h2 className="text-3xl font-extrabold text-gray-800 border-b pb-2 mb-6 flex items-center gap-3">
                <span className="text-4xl">🗺️</span> Fichas / Mesas Ativas
            </h2>
            
            {/* Grid ajustado para caber 50 itens bem distribuídos na tela */}
            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-8 xl:grid-cols-10 gap-4">
                {mesas.map(m => (
                    <div key={m.num} 
                         onClick={() => selecionarMesa(m.nome)}
                         className={`mesa-card shadow-lg ${m.status === 'livre' ? 'mesa-livre' : m.status === 'ocupada' ? 'mesa-ocupada' : 'mesa-pagamento'}`}>
                        <div className="text-3xl font-bold">{m.num}</div>
                        <div className="text-sm mt-1 font-semibold">{m.status === 'livre' ? 'LIVRE' : currency(m.total)}</div>
                        {m.status !== 'livre' && <div className="text-xs mt-1 bg-black/20 px-2 rounded text-white font-bold">{m.pedidos.length} ped.</div>}
                    </div>
                ))}
            </div>

            <div className="mt-8 flex gap-6 justify-center bg-white p-4 rounded-xl shadow-sm border w-fit mx-auto">
                <div className="flex items-center gap-2"><div className="w-4 h-4 bg-green-500 border-2 border-green-700 rounded-full"></div> <span className="text-sm text-gray-600 font-bold">Livre</span></div>
                <div className="flex items-center gap-2"><div className="w-4 h-4 bg-red-500 border-2 border-red-700 rounded-full"></div> <span className="text-sm text-gray-600 font-bold">Ocupada</span></div>
                <div className="flex items-center gap-2"><div className="w-4 h-4 bg-yellow-500 border-2 border-yellow-700 rounded-full"></div> <span className="text-sm text-gray-600 font-bold">Conta/Pronto</span></div>
            </div>
        </div>
    );
  }

  /*********************
   * Detalhe da Mesa View
   *********************/
  function DetalheMesaView({ mesa, pedidos, voltarMapa, novoPedido, fecharConta, transferirMesa }) {
    const pedidosMesa = pedidos.filter(p => p.nomeCliente === mesa && p.status !== 'Vendido');
    const totalMesa = pedidosMesa.reduce((acc, p) => acc + p.total, 0);

    const [modoFechamento, setModoFechamento] = useState(false);
    const [metodoDinheiro, setMetodoDinheiro] = useState(false);
    const [valorRecebido, setValorRecebido] = useState('');
    const [modoTransferencia, setModoTransferencia] = useState(false);
    const [novaMesa, setNovaMesa] = useState('');

    // 50 opções de transferência
    const mesasDisponiveis = Array.from({length: 50}, (_, i) => {
        const num = i + 1;
        return `Mesa ${num < 10 ? '0'+num : num}`;
    }).filter(m => m !== mesa);

    const itensAgrupados = [];
    pedidosMesa.forEach(p => p.itens.forEach(i => itensAgrupados.push(i)));

    const podeFechar = pedidosMesa.every(p => p.status === 'Pronto');

    if (modoTransferencia) {
        return (
            <div className="p-8 flex flex-col items-center justify-center h-full bg-slate-100 min-h-[500px] animate-fade-in w-full max-w-[1600px] mx-auto">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full text-center border-4 border-indigo-500">
                    <h2 className="text-2xl font-bold mb-2 text-indigo-700">Transferir {mesa}</h2>
                    <select value={novaMesa} onChange={e => setNovaMesa(e.target.value)} className="w-full p-4 text-xl text-center border-2 border-indigo-200 rounded-xl mb-6 outline-none focus:border-indigo-500">
                        <option value="">Selecione a nova mesa...</option>
                        {mesasDisponiveis.map(m => <option key={m} value={m}>{m}</option>)}
                    </select>
                    <div className="flex gap-3">
                        <button onClick={() => { setModoTransferencia(false); setNovaMesa(''); }} className="flex-1 py-4 bg-gray-200 rounded-xl font-bold hover:bg-gray-300">Cancelar</button>
                        <button onClick={() => { transferirMesa(mesa, novaMesa); setModoTransferencia(false); }} disabled={!novaMesa} className="flex-1 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 disabled:opacity-50">Confirmar</button>
                    </div>
                </div>
            </div>
        )
    }

    if (modoFechamento && metodoDinheiro) {
        const troco = Number(String(valorRecebido).replace(',', '.')) - totalMesa;
        return (
            <div className="p-8 flex flex-col items-center justify-center h-full bg-slate-100 min-h-[500px] animate-fade-in w-full max-w-[1600px] mx-auto">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full text-center border-4 border-green-500">
                    <h2 className="text-2xl font-bold mb-2 text-green-700">Pagamento Dinheiro</h2>
                    <div className="text-3xl font-bold text-gray-800 mb-6">Total: {currency(totalMesa)}</div>
                    <input type="number" step="0.01" value={valorRecebido} onChange={e => setValorRecebido(e.target.value)} className="w-full p-4 text-3xl text-center border-2 border-green-500 rounded-xl mb-4 outline-none focus:ring-4 focus:ring-green-100" placeholder="Valor entregue" autoFocus />
                    
                    {valorRecebido && troco >= 0 && (
                        <div className="mb-6 p-4 bg-green-100 rounded-xl border border-green-300">
                            <div className="text-sm text-green-700 font-bold uppercase">Troco:</div>
                            <div className="text-5xl font-extrabold text-green-700">{currency(troco)}</div>
                        </div>
                    )}
                    <div className="flex gap-3 mt-4">
                        <button onClick={() => { setMetodoDinheiro(false); setValorRecebido(''); }} className="flex-1 py-4 bg-gray-200 rounded-xl font-bold hover:bg-gray-300">Voltar</button>
                        <button onClick={() => fecharConta(mesa, pedidosMesa, totalMesa, 'Dinheiro')} disabled={!valorRecebido || troco < 0} className="flex-1 py-4 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 disabled:opacity-50">Confirmar</button>
                    </div>
                </div>
            </div>
        )
    }

    if (modoFechamento && !metodoDinheiro) {
        return (
            <div className="p-8 flex flex-col items-center justify-center h-full bg-slate-100 min-h-[500px] animate-fade-in w-full max-w-[1600px] mx-auto">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full text-center">
                    <h2 className="text-2xl font-bold mb-2">Fechar {mesa}</h2>
                    <div className="text-4xl font-black text-gray-800 mb-6">{currency(totalMesa)}</div>
                    <div className="grid grid-cols-1 gap-3">
                        <button onClick={() => setMetodoDinheiro(true)} className="py-4 bg-green-600 text-white rounded-xl font-bold">💵 Dinheiro</button>
                        <button onClick={() => fecharConta(mesa, pedidosMesa, totalMesa, 'Pix')} className="py-4 bg-teal-600 text-white rounded-xl font-bold">💠 Pix</button>
                        <button onClick={() => fecharConta(mesa, pedidosMesa, totalMesa, 'Débito')} className="py-4 bg-blue-600 text-white rounded-xl font-bold">💳 Cartão Débito</button>
                        <button onClick={() => fecharConta(mesa, pedidosMesa, totalMesa, 'Crédito')} className="py-4 bg-purple-600 text-white rounded-xl font-bold">💳 Cartão Crédito</button>
                    </div>
                    <button onClick={() => setModoFechamento(false)} className="mt-6 text-gray-500 font-bold hover:underline">Cancelar</button>
                </div>
            </div>
        )
    }

    return (
        <div className="p-6 bg-slate-50 min-h-full flex flex-col animate-fade-in w-full max-w-[1600px] mx-auto">
            <div className="flex items-center justify-between mb-6 border-b pb-4">
                <button onClick={voltarMapa} className="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg font-bold text-gray-700 flex gap-2 items-center">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Voltar
                </button>
                <h2 className="text-3xl font-extrabold text-gray-800">{mesa}</h2>
                <div className="text-2xl font-black bg-white px-6 py-2 rounded-xl shadow border text-indigo-700">{currency(totalMesa)}</div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">
                <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-200 p-4">
                    <h3 className="text-lg font-bold mb-4 border-b pb-2 text-gray-700">Itens Consumidos</h3>
                    <div className="overflow-y-auto space-y-3">
                        {pedidosMesa.length === 0 ? <div className="text-center text-gray-500 py-10">Ficha/Mesa Vazia.</div> : 
                            pedidosMesa.map(pedido => (
                                <div key={pedido.id} className="border rounded-lg p-3 bg-gray-50">
                                    <div className="flex justify-between font-bold text-sm text-gray-500 mb-2">
                                        <span className={`px-2 py-1 rounded text-xs ${pedido.status === 'Pendente' ? 'bg-yellow-100 text-yellow-800' : 'bg-indigo-100 text-indigo-800'}`}>{pedido.status}</span>
                                        <span>{new Date(pedido.data).toLocaleTimeString()}</span>
                                    </div>
                                    <ul className="text-sm ml-4 list-disc space-y-1">
                                        {pedido.itens.map((item, idx) => (
                                            <li key={idx} className="flex justify-between">
                                                <span className="font-medium">{item.quantidade}x {item.nome} {item.obs && <span className="text-xs text-gray-400 block ml-4">Obs: {item.obs}</span>}</span>
                                                <span className="font-bold text-gray-700">{currency(item.preco * item.quantidade)}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))
                        }
                    </div>
                </div>

                <div className="space-y-4">
                    <button onClick={novoPedido} className="w-full py-4 bg-dourado text-black rounded-xl font-black text-lg shadow hover:bg-douradoEscuro transition uppercase">➕ Novo Pedido</button>
                    <button onClick={() => setModoTransferencia(true)} disabled={totalMesa===0} className="w-full py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold shadow-sm border border-indigo-200 hover:bg-indigo-100 disabled:opacity-50 transition uppercase text-sm">🔄 Transferir Ficha</button>
                    
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 mt-4">
                        <h4 className="font-bold text-gray-700 mb-2">Resumo da Conta</h4>
                        <div className="flex justify-between text-xl font-black border-t pt-2 mb-4 text-gray-800">
                            <span>Total Geral</span>
                            <span>{currency(totalMesa)}</span>
                        </div>
                        <button onClick={() => setModoFechamento(true)} disabled={totalMesa === 0} className={`w-full py-3 rounded-xl font-black text-white shadow transition uppercase ${totalMesa > 0 ? 'bg-green-600 hover:bg-green-700' : 'bg-gray-400'}`}>💰 Fechar Conta</button>
                    </div>
                </div>
            </div>
        </div>
    );
  }

  /* ================= TELA DE LOGIN ATUALIZADA (CORRIGIDA) ================= */
  function Login(){
    const [email, setEmail] = useState('vitrine@victorino.com');
    const [p, setP] = useState('123456');
    const [err, setErr] = useState('');
    const [loading, setLoading] = useState(false);

    const { auth, signInWithEmailAndPassword } = window.firebaseMethods;

    function limparCache() {
      if(confirm("Isso irá resetar os dados locais e tentar uma nova conexão com o servidor. Continuar?")) {
        window.indexedDB.deleteDatabase("firestoreDb"); 
        localStorage.clear();
        sessionStorage.clear();
        alert("Memória limpa! A página será reiniciada.");
        window.location.reload();
      }
    }

    async function submit(e){
      e.preventDefault();
      setLoading(true);
      setErr('');
      try {
        // Envia direto para o Firebase Auth (Seguro)
        await signInWithEmailAndPassword(auth, email.trim(), p);
        // Removemos a linha problemática aqui.
        // Agora o "App" principal vai detectar o login sozinho e puxar o seu cargo correto de Admin!
      } catch (error) {
        setErr('E-mail ou senha inválidos. Tente novamente.');
      }
      setLoading(false);
    }

    return (
      <div className="min-h-screen flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center relative px-4">
        <div className="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div className="relative w-full max-w-3xl h-auto md:h-[450px] bg-black/40 border border-white/10 backdrop-blur-md rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row animate-fade-in">
            <div className="w-full md:w-5/12 p-8 flex flex-col justify-center items-center text-center bg-gradient-to-br from-black/60 to-transparent border-r border-white/5">
                <div className="mb-4 p-4 rounded-full border-2 border-dourado shadow-[0_0_15px_rgba(212,175,55,0.3)] bg-white">
                    <img src="img/victorino.png" alt="Logo" className="w-24 h-24 object-contain rounded-full" onError={(e)=>{e.target.style.display='none'}} />
                </div>
                <h1 className="text-3xl font-extrabold text-white tracking-wide">VICTORINO<span className="text-dourado">ENG</span></h1>
                <p className="text-gray-300 mt-2 text-sm font-light">Acesso Local (Vitrine)</p>
            </div>
            <div className="w-full md:w-7/12 p-8 bg-white/5 flex flex-col justify-center">
                <h2 className="text-2xl font-bold text-white mb-1">Bem-vindo</h2>
                <p className="text-gray-400 text-sm mb-6">Faça login com seu e-mail autorizado.</p>
                <form onSubmit={submit} className="space-y-4">
                    <input type="email" className="block w-full px-4 py-3 border border-white/20 rounded-lg bg-black/50 text-white placeholder-gray-500 focus:outline-none focus:border-dourado transition duration-200 text-base" 
                           value={email} onChange={e=>setEmail(e.target.value)} placeholder="E-mail" required />
                    <input type="password" className="block w-full px-4 py-3 border border-white/20 rounded-lg bg-black/50 text-white placeholder-gray-500 focus:outline-none focus:border-dourado transition duration-200 text-base" 
                           value={p} onChange={e=>setP(e.target.value)} placeholder="Senha" required />
                    
                    {err && <div className="text-red-400 text-sm bg-red-900/20 p-2 rounded border border-red-500/30 text-center">{err}</div>}
                    
                    <button disabled={loading} className="w-full py-3 px-4 text-base font-bold rounded-lg text-black bg-gradient-to-r from-dourado to-douradoEscuro hover:shadow-lg transition duration-300 disabled:opacity-50">
                        {loading ? 'AUTENTICANDO...' : 'ACESSAR SISTEMA'}
                    </button>

                    <button type="button" onClick={limparCache} className="w-full text-gray-400 text-xs hover:text-white transition flex items-center justify-center gap-2 mt-2">
                        <span>🔄 Problemas na conexão? Limpar Memória</span>
                    </button>
                </form>
            </div>
        </div>
      </div>
    );
  }

  /* ================= COMPONENTE: AVARIAS ================= */
  function AvariasView({ produtos, avarias, registrarAvaria, user }) {
      const [busca, setBusca] = useState('');
      const [prodSelecionado, setProdSelecionado] = useState(null);
      const [qtd, setQtd] = useState(1);
      const [motivo, setMotivo] = useState('Danificado / Quebrado');
      const [outroMotivo, setOutroMotivo] = useState('');

      const produtosFiltrados = produtos.filter(p => p.nome.toLowerCase().includes(busca.toLowerCase()));
      const totalPrejuizo = avarias.reduce((acc, item) => acc + item.valorPerdido, 0);

      function handleRegistrar(e) {
          e.preventDefault();
          if (!prodSelecionado) return alert("Selecione um produto.");
          if (qtd <= 0) return alert("Quantidade inválida.");
          
          const motivoFinal = motivo === 'Outros' ? outroMotivo : motivo;
          if(!motivoFinal) return alert("Informe o motivo.");

          if(confirm(`Confirmar baixa de ${qtd}x ${prodSelecionado.nome} como AVARIA?\nIsso será descontado do estoque.`)) {
              registrarAvaria(prodSelecionado.id, parseInt(qtd), motivoFinal);
              setProdSelecionado(null);
              setQtd(1);
              setBusca('');
              setMotivo('Danificado / Quebrado');
              setOutroMotivo('');
          }
      }

      return (
          <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
              <h2 className="text-2xl font-bold text-gray-800 border-b pb-3 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                  <span>🗑️ Gestão de Avarias & Perdas</span>
                  <div className="text-base bg-red-50 text-red-700 px-4 py-2 rounded-lg border border-red-200">
                      Prejuízo Acumulado: <span className="font-bold text-xl">{currency(totalPrejuizo)}</span>
                  </div>
              </h2>

              <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 xl:col-span-1 h-fit">
                      <h3 className="font-bold text-gray-700 mb-4 text-base uppercase border-b pb-2">Registrar Nova Perda</h3>
                      
                      <div className="mb-4 relative">
                          <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Buscar Produto</label>
                          <input 
                              value={busca} 
                              onChange={e => { setBusca(e.target.value); setProdSelecionado(null); }}
                              placeholder="Digite o nome..." 
                              className="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-red-500 text-base"
                          />
                          {busca && !prodSelecionado && (
                              <div className="absolute z-10 w-full bg-white border border-gray-200 mt-1 max-h-60 overflow-y-auto rounded-md shadow-lg">
                                  {produtosFiltrados.map(p => (
                                      <div key={p.id} onClick={() => { setProdSelecionado(p); setBusca(p.nome); }} className="p-3 hover:bg-gray-100 cursor-pointer text-sm flex justify-between border-b last:border-0">
                                          <span>{p.nome}</span>
                                          <span className="font-bold text-gray-500">Est: {p.estoque}</span>
                                      </div>
                                  ))}
                              </div>
                          )}
                      </div>

                      {prodSelecionado && (
                          <div className="bg-red-50 p-4 rounded-lg mb-4 border border-red-100 text-sm">
                              <div className="font-bold text-red-800 text-lg">{prodSelecionado.nome}</div>
                              <div className="text-gray-700 mt-1">Preço Venda: {currency(prodSelecionado.preco)}</div>
                              <div className="text-gray-700">Em Estoque: <strong>{prodSelecionado.estoque}</strong></div>
                          </div>
                      )}

                      <form onSubmit={handleRegistrar}>
                          <div className="grid grid-cols-2 gap-4 mb-4">
                              <div>
                                  <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Quantidade</label>
                                  <input type="number" min="1" value={qtd} onChange={e=>setQtd(e.target.value)} className="w-full p-3 border rounded-lg outline-none text-base" required />
                              </div>
                              <div>
                                  <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Motivo</label>
                                  <select value={motivo} onChange={e=>setMotivo(e.target.value)} className="w-full p-3 border rounded-lg outline-none text-base bg-white h-[50px]">
                                      <option>Danificado / Quebrado</option>
                                      <option>Vencido / Estragado</option>
                                      <option>Consumo Próprio</option>
                                      <option>Roubo / Furto</option>
                                      <option>Outros</option>
                                  </select>
                              </div>
                          </div>
                          
                          {motivo === 'Outros' && (
                              <div className="mb-4">
                                  <input value={outroMotivo} onChange={e=>setOutroMotivo(e.target.value)} placeholder="Descreva o motivo..." className="w-full p-3 border rounded-lg outline-none text-base" required />
                              </div>
                          )}

                          <button disabled={!prodSelecionado} className="w-full py-3 bg-red-600 text-white font-bold rounded-lg shadow hover:bg-red-700 transition disabled:opacity-50 text-base uppercase tracking-wide">
                              CONFIRMAR BAIXA
                          </button>
                      </form>
                  </div>

                  <div className="xl:col-span-2 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[600px]">
                      <div className="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                          <h3 className="font-bold text-gray-700 text-base">Histórico de Perdas</h3>
                          <span className="text-xs text-gray-500 font-bold bg-white px-2 py-1 rounded border">{avarias.length} registros</span>
                      </div>
                      <div className="overflow-y-auto flex-1">
                          <table className="w-full text-sm md:text-base">
                              <thead className="bg-white text-gray-500 sticky top-0 shadow-sm z-10">
                                  <tr>
                                      <th className="p-3 text-left">Data</th>
                                      <th className="p-3 text-left">Produto</th>
                                      <th className="p-3 text-center">Qtd</th>
                                      <th className="p-3 text-left">Motivo</th>
                                      <th className="p-3 text-right">Prejuízo Est.</th>
                                  </tr>
                              </thead>
                              <tbody className="divide-y divide-gray-100">
                                  {avarias.slice().reverse().map(a => (
                                      <tr key={a.id} className="hover:bg-red-50 transition">
                                          <td className="p-3 text-gray-500 text-sm">{new Date(a.data).toLocaleDateString()} <br/> <span className="text-xs">{new Date(a.data).toLocaleTimeString()}</span></td>
                                          <td className="p-3 font-medium text-gray-800">{a.produtoNome} <br/> <span className="text-xs text-gray-400">Op: {a.usuario}</span></td>
                                          <td className="p-3 text-center font-bold text-lg">{a.qtd}</td>
                                          <td className="p-3 text-sm text-gray-600">{a.motivo}</td>
                                          <td className="p-3 text-right font-bold text-red-600">{currency(a.valorPerdido)}</td>
                                      </tr>
                                  ))}
                                  {avarias.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-gray-400">Nenhuma avaria registrada.</td></tr>}
                              </tbody>
                          </table>
                      </div>
                  </div>
              </div>
          </div>
      );
  }

  /* ================= COMPONENTE: INTELIGÊNCIA ================= */
  function IntelligenceView({ produtos, vendas, user }) {
    if (user.role !== 'admin') return <div className="p-10 text-center font-bold text-red-500">Acesso Negado.</div>;
    const [filtro, setFiltro] = useState('');
    const [filtroStatus, setFiltroStatus] = useState('');

    const valorTotalEstoque = useMemo(() => {
    return produtos.reduce((acc, p) => acc + (p.preco * p.estoque), 0);
    }, [produtos]);

    const dadosGiro = useMemo(() => {
        const vendasMap = {};
        vendas.forEach(v => {
            if(v.itens){
                v.itens.forEach(item => {
                    vendasMap[item.id] = (vendasMap[item.id] || 0) + item.quantidade;
                });
            }
        });
        return produtos.map(p => {
            const qtdVendida = vendasMap[p.id] || 0;
            const faturamentoGerado = qtdVendida * p.preco;
            let status = 'Normal';
            let corStatus = 'bg-gray-100 text-gray-800 border-gray-200';
            if (qtdVendida > 20) { status = '🔥 GIRANDO MUITO'; corStatus = 'bg-green-100 text-green-800 border-green-300'; } 
            else if (qtdVendida > 5) { status = '✅ BOM GIRO'; corStatus = 'bg-blue-100 text-blue-800 border-blue-300'; } 
            else if (qtdVendida === 0 && p.estoque > 0) { status = '❄️ PARADO'; corStatus = 'bg-red-100 text-red-800 border-red-300'; } 
            else if (p.estoque === 0) { status = '⚠️ SEM ESTOQUE'; corStatus = 'bg-yellow-100 text-yellow-800 border-yellow-300'; }
            return { ...p, qtdVendida, faturamentoGerado, status, corStatus };
        });
    }, [produtos, vendas]);

    const dadosFiltrados = dadosGiro.filter(p => {
        const termo = filtro.toLowerCase();
        const matchTexto = p.nome.toLowerCase().includes(termo) || p.categoria.toLowerCase().includes(termo);
        const matchStatus = filtroStatus === '' || p.status === filtroStatus;
        return matchTexto && matchStatus;
    });

    const topVendas = [...dadosGiro].sort((a,b) => b.qtdVendida - a.qtdVendida).slice(0, 5);
    const parados = [...dadosGiro].filter(p => p.qtdVendida === 0 && p.estoque > 0).slice(0, 5);

    return (
        <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
            <h2 className="text-2xl font-bold text-gray-800 border-b pb-3">📈 Inteligência de Negócio</h2>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-t-4 border-t-green-500">
                    <h3 className="font-bold text-base text-green-800 mb-4 flex items-center gap-2"><span className="text-2xl">🏆</span> O que mais vende</h3>
                    <div className="space-y-3">
                        {topVendas.map((p, idx) => (
                            <div key={p.id} className="flex justify-between items-center border-b border-gray-100 pb-2 last:border-0 hover:bg-gray-50 p-2 rounded transition text-base">
                                <div className="flex items-center gap-3">
                                    <span className={`font-bold w-6 h-6 flex items-center justify-center rounded-full text-xs ${idx===0 ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-500'}`}>#{idx+1}</span>
                                    <div><div className="font-bold text-gray-800">{p.nome}</div></div>
                                </div>
                                <div className="text-right"><div className="font-bold text-green-600">{p.qtdVendida} un.</div></div>
                            </div>
                        ))}
                    </div>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-t-4 border-t-red-500">
                    <h3 className="font-bold text-base text-red-800 mb-4 flex items-center gap-2"><span className="text-2xl">🛑</span> Produtos Parados</h3>
                    <div className="space-y-3">
                        {parados.length === 0 ? <div className="text-gray-400 text-sm italic py-4 text-center">Tudo está vendendo!</div> : parados.map((p) => (
                            <div key={p.id} className="flex justify-between items-center border-b border-red-100 pb-2 last:border-0 bg-red-50 p-2 rounded text-base">
                                <div><div className="font-bold text-gray-700">{p.nome}</div></div>
                                <div className="text-right"><div className="font-bold text-gray-800">{p.estoque} un.</div></div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
            
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div className="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4">
                    <h3 className="font-bold text-lg text-gray-700">🔍 Análise Detalhada</h3>
                    <div className="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                        <select 
                            value={filtroStatus} 
                            onChange={e => setFiltroStatus(e.target.value)} 
                            className="p-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-dourado bg-gray-50 text-gray-700 text-base outline-none h-11"
                        >
                            <option value="">Todos os Status</option>
                            <option value="🔥 GIRANDO MUITO">🔥 Girando Muito</option>
                            <option value="✅ BOM GIRO">✅ Bom Giro</option>
                            <option value="Normal">Normal</option>
                            <option value="❄️ PARADO">❄️ Parado</option>
                            <option value="⚠️ SEM ESTOQUE">⚠️ Sem Estoque</option>
                        </select>
                        <input value={filtro} onChange={e => setFiltro(e.target.value)} placeholder="Pesquisar..." className="p-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-dourado min-w-[250px] outline-none text-base h-11" />
                    </div>
                </div>
                <div className="overflow-x-auto rounded-lg border border-gray-200">
                    <table className="w-full text-sm md:text-base">
                        <thead className="bg-gray-100 text-gray-600">
                            <tr><th className="p-3 text-left">Produto</th><th className="p-3 text-center">Status</th><th className="p-3 text-right">Estoque</th><th className="p-3 text-right">Vendido</th><th className="p-3 text-right">Preço Un.</th></tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                            {dadosFiltrados.length === 0 ? (
                                <tr><td colSpan="5" className="p-6 text-center text-gray-400">Nenhum produto encontrado.</td></tr>
                            ) : dadosFiltrados.map(p => (
                                <tr key={p.id} className="hover:bg-gray-50 transition">
                                    <td className="p-3 font-medium text-gray-800">{p.nome}</td>
                                    <td className="p-3 text-center"><span className={`px-3 py-1 rounded-full text-xs uppercase tracking-wide font-bold border ${p.corStatus}`}>{p.status}</span></td>
                                    <td className="p-3 text-right font-bold text-gray-700">{p.estoque}</td>
                                    <td className="p-3 text-right text-gray-600">{p.qtdVendida}</td>
                                    <td className="p-3 text-right font-medium">{currency(p.preco)}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    );
  }

  /* ================= COMPONENTE: USUARIOS ================= */
  function UsuariosView({ users, currentUser }) {
      const [novoUser, setNovoUser] = useState('');
      const [novaSenha, setNovaSenha] = useState('');
      const [novoRole, setNovoRole] = useState('funcionario');
      const { addDoc, collection, deleteDoc, doc } = window.firebaseMethods;
      const db = window.db;

      async function cadastrar(e){
          e.preventDefault();
          if(!novoUser || !novaSenha) return alert("Preencha todos os campos");
          if(users.some(u => u.username.toLowerCase() === novoUser.toLowerCase())) return alert("Usuário já existe!");
          await addDoc(collection(db, "users"), { username: novoUser.trim(), password: novaSenha, role: novoRole });
          setNovoUser(''); setNovaSenha(''); alert(`Usuário ${novoUser} cadastrado com sucesso!`);
      }
      async function remover(id){
          if(id === currentUser.id) return alert("Você não pode se excluir!");
          const userToDelete = users.find(u=>u.id===id);
          if(!confirm(`Tem certeza que deseja remover o acesso de ${userToDelete.username}?`)) return;
          if(users.filter(u=>u.role==='admin' && u.id !== id).length === 0) return alert("O sistema precisa de pelo menos 1 admin.");
          await deleteDoc(doc(db, "users", id));
      }
      return (
          <div className="space-y-6 animate-fade-in w-full max-w-[1200px] mx-auto">
              <h2 className="text-2xl font-bold text-gray-800 border-b pb-3">👥 Gestão de Usuários</h2>
              <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                  <h3 className="font-bold text-base mb-4 text-indigo-700">Cadastrar Novo Acesso</h3>
                  <form onSubmit={cadastrar} className="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                      <label className="block">
                          <span className="text-xs font-bold text-gray-500 uppercase">Usuário</span>
                          <input value={novoUser} onChange={e=>setNovoUser(e.target.value)} className="mt-1 w-full p-2 h-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base" placeholder="Ex: joao" required />
                      </label>
                      <label className="block">
                          <span className="text-xs font-bold text-gray-500 uppercase">Senha</span>
                          <input value={novaSenha} onChange={e=>setNovaSenha(e.target.value)} className="mt-1 w-full p-2 h-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base" placeholder="******" required />
                      </label>
                      <label className="block">
                          <span className="text-xs font-bold text-gray-500 uppercase">Permissão</span>
                          <select value={novoRole} onChange={e=>setNovoRole(e.target.value)} className="mt-1 w-full p-2 h-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white text-base">
                              <option value="funcionario">Vendedor (Básico)</option>
                              <option value="admin">Administrador (Total)</option>
                          </select>
                      </label>
                      <button className="h-10 px-6 bg-indigo-600 text-white rounded-lg font-bold shadow hover:bg-indigo-700 transition text-sm uppercase">Cadastrar</button>
                  </form>
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <table className="w-full text-base">
                      <thead className="bg-gray-50 text-gray-600 border-b"><tr><th className="p-4 text-left">Usuário</th><th className="p-4 text-left">Nível</th><th className="p-4 text-right">Ação</th></tr></thead>
                      <tbody className="divide-y">
                          {users.map(u => (
                              <tr key={u.id} className="hover:bg-gray-50">
                                  <td className="p-4 font-bold text-gray-800">{u.username} {u.id === currentUser.id && <span className="text-xs font-normal text-gray-500 ml-2">(Você)</span>}</td>
                                  <td className="p-4"><span className={`px-3 py-1 rounded text-xs font-bold ${u.role==='admin' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-700'}`}>{u.role.toUpperCase()}</span></td>
                                  <td className="p-4 text-right"><button onClick={()=>remover(u.id)} className="text-red-500 hover:text-red-700 font-bold text-xs uppercase hover:underline disabled:opacity-30" disabled={u.id===currentUser.id}>Remover</button></td>
                              </tr>
                          ))}
                      </tbody>
                  </table>
              </div>
          </div>
      );
  }

  /* ================= COMPONENTE: FIADO ================= */
  function FiadoView({ fiados, vendas, user }) {
      const [nomeNovo, setNomeNovo] = useState('');
      const [valorPagamento, setValorPagamento] = useState('');
      const [clienteSelecionado, setClienteSelecionado] = useState(null);
      const { addDoc, collection, updateDoc, doc } = window.firebaseMethods;
      const db = window.db;

      async function criarDevedor(e){
          e.preventDefault();
          if(!nomeNovo) return;
          await addDoc(collection(db, "fiados"), { nome: nomeNovo, saldoDevedor: 0, historico: [] });
          setNomeNovo('');
          alert('Cliente cadastrado.');
      }

      async function receberPagamento(e){
          e.preventDefault();
          if(!clienteSelecionado || !valorPagamento) return;
          const valor = parseFloat(valorPagamento);
          if(valor <= 0) return alert("Valor inválido");
          
          if(confirm(`Receber ${currency(valor)} de ${clienteSelecionado.nome}?`)){
              const clienteRef = doc(db, "fiados", clienteSelecionado.id);
              await updateDoc(clienteRef, {
                  saldoDevedor: clienteSelecionado.saldoDevedor - valor,
                  historico: [...clienteSelecionado.historico, { data: new Date().toISOString(), tipo: 'PAGAMENTO', valor: valor }]
              });

              if(confirm("Lançar recebimento nas VENDAS do dia?")){
                  await addDoc(collection(db, "vendas"), {
                      data: new Date().toISOString(),
                      itens: [], total: valor,
                      origem: `Receb. Fiado - ${clienteSelecionado.nome}`,
                      tipoPagamento: 'Dinheiro',
                      vendedor: user.username
                  });
              }
              setValorPagamento('');
              setClienteSelecionado(null);
          }
      }

      const restantePreview = clienteSelecionado ? clienteSelecionado.saldoDevedor - (parseFloat(valorPagamento) || 0) : 0;

      return (
          <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
               <h2 className="text-2xl font-bold text-gray-800 border-b pb-3">📒 Caderno de Fiado</h2>
               
               <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row gap-4 items-end">
                   <div className="flex-1 w-full">
                       <label className="text-xs font-bold text-gray-500 uppercase">Adicionar Novo Cliente</label>
                       <input value={nomeNovo} onChange={e=>setNomeNovo(e.target.value)} className="w-full p-2 h-11 border rounded-lg mt-1 focus:ring-2 focus:ring-indigo-500 outline-none text-base" placeholder="Nome do Cliente..." />
                   </div>
                   <button onClick={criarDevedor} className="w-full md:w-auto px-6 h-11 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition text-sm uppercase">Cadastrar</button>
               </div>

               <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                   <div className="xl:col-span-2 space-y-3">
                       {fiados.map(f => (
                           <div key={f.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:border-orange-200 transition flex justify-between items-center group">
                               <div>
                                   <div className="font-bold text-lg text-gray-800">{f.nome}</div>
                                   <div className="text-xs text-gray-400">{f.historico.length} movimentações registradas</div>
                               </div>
                               <div className="text-right">
                                   <div className="text-[10px] text-gray-500 uppercase font-bold">Dívida Atual</div>
                                   <div className="text-xl font-bold text-red-600">{currency(f.saldoDevedor)}</div>
                                   {f.saldoDevedor > 0 && <button onClick={()=>setClienteSelecionado(f)} className="mt-2 text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-bold hover:bg-green-200 transition">Receber Pagamento</button>}
                               </div>
                           </div>
                       ))}
                       {fiados.length === 0 && <div className="text-gray-400 text-center py-12 bg-gray-50 rounded-xl border border-dashed border-gray-300">Nenhum cliente cadastrado no fiado.</div>}
                   </div>

                   <div className="h-fit sticky top-20">
                       {clienteSelecionado ? (
                           <div className="bg-white p-6 rounded-2xl shadow-lg border border-orange-100 animate-slide-left">
                               <h3 className="font-bold text-lg text-gray-800 mb-4 border-b pb-2">Baixar Conta</h3>
                               <div className="mb-4 bg-orange-50 p-4 rounded-xl border border-orange-100">
                                   <div className="text-xs text-gray-500 uppercase font-bold">Cliente Selecionado</div>
                                   <div className="font-extrabold text-xl text-gray-800">{clienteSelecionado.nome}</div>
                                   <div className="flex justify-between items-end mt-2">
                                       <span className="text-sm">Total Devido:</span>
                                       <span className="font-bold text-red-600 text-lg">{currency(clienteSelecionado.saldoDevedor)}</span>
                                   </div>
                               </div>
                               
                               <form onSubmit={receberPagamento}>
                                   <label className="block mb-1 text-xs font-bold text-gray-500 uppercase">Valor do Pagamento</label>
                                   <input type="number" step="0.01" value={valorPagamento} onChange={e=>setValorPagamento(e.target.value)} className="w-full p-3 border-2 border-indigo-100 rounded-lg mb-4 text-2xl font-bold text-gray-800 text-right focus:border-indigo-500 outline-none transition" placeholder="0,00" autoFocus />
                                   
                                   <div className="mb-6 p-3 bg-gray-50 rounded-lg flex justify-between items-center border border-gray-100">
                                        <span className="text-xs text-gray-500 font-bold uppercase">Restante</span>
                                        <span className={`font-bold text-base ${restantePreview < 0 ? 'text-green-600' : 'text-gray-800'}`}>
                                            {currency(restantePreview)} {restantePreview < 0 && '(Troco)'}
                                        </span>
                                   </div>

                                   <div className="flex gap-3">
                                       <button type="button" onClick={()=>{setClienteSelecionado(null); setValorPagamento('');}} className="flex-1 py-3 border border-gray-300 rounded-lg text-gray-600 font-bold hover:bg-gray-50 text-sm">Cancelar</button>
                                       <button type="submit" className="flex-1 py-3 bg-green-600 text-white rounded-lg font-bold shadow-md hover:bg-green-700 hover:shadow-lg transition text-sm">Confirmar</button>
                                   </div>
                               </form>
                           </div>
                       ) : (
                           <div className="bg-gray-50 p-8 rounded-2xl border border-gray-200 text-center text-gray-400 hidden xl:block">
                               <div className="text-4xl mb-3">👈</div>
                               <span className="text-sm">Selecione um cliente para registrar pagamento.</span>
                           </div>
                       )}
                   </div>
               </div>
          </div>
      );
  }

  /* ================= COMPONENTE: PDV (VENDAS) ================= */
  function PDVView({produtos, adicionarAoCarrinho, busca, setBusca, carrinho, alterarQuantidade, removerDoCarrinho, finalizarVenda, totalCarrinho, abrirComanda, finalizarFiado, fiados, setSelected, mesaAtiva, enviarPedidoMesa}){
    const [filtroCategoria, setFiltroCategoria] = useState('');
    
    const categoriasUnicas = useMemo(() => {
        const cats = produtos.map(p => p.categoria).filter(Boolean);
        return [...new Set(cats)].sort();
    }, [produtos]);

    const produtosFiltrados = produtos.filter(p => {
        const matchBusca = p.nome.toLowerCase().includes(busca.toLowerCase()) || p.categoria.toLowerCase().includes(busca.toLowerCase());
        const matchCat = filtroCategoria === '' || p.categoria === filtroCategoria;
        return matchBusca && matchCat;
    });
    
    const [modalFiadoOpen, setModalFiadoOpen] = useState(false);
    const [modalPagamentoOpen, setModalPagamentoOpen] = useState(false);
    const [selectedClienteId, setSelectedClienteId] = useState('');

    // NOVOS CONTROLES PARA O TROCO NO CAIXA
    const [modoDinheiro, setModoDinheiro] = useState(false);
    const [valorRecebido, setValorRecebido] = useState('');
    const troco = Number(String(valorRecebido).replace(',', '.')) - totalCarrinho;

    function handleClickFiado() {
        if (carrinho.length === 0) return alert('Carrinho vazio!');
        if (fiados.length === 0) {
            if(confirm("Você não tem clientes cadastrados no FIADO.\nDeseja ir para a aba de cadastro agora?")) {
                setSelected('fiado');
            }
            return;
        }
        setModalFiadoOpen(true);
        setSelectedClienteId('');
    }

    function handleClickPagar() {
        if (carrinho.length === 0) return alert('Carrinho vazio!');
        setModalPagamentoOpen(true);
        setModoDinheiro(false);
        setValorRecebido('');
    }

    function confirmarSelecaoFiado() {
        if(!selectedClienteId) return alert("Selecione um cliente da lista!");
        finalizarFiado(selectedClienteId);
        setModalFiadoOpen(false);
    }

    function confirmarPagamento(metodo) {
        finalizarVenda(metodo);
        setModalPagamentoOpen(false);
        setModoDinheiro(false);
        setValorRecebido('');
    }

    return (
      <div className="space-y-4 w-full pb-4 relative">
        
        {/* TOPO: BUSCA E FILTROS */}
        <div className="flex flex-col sm:flex-row gap-3 bg-white p-3 rounded-xl shadow-sm border border-gray-200">
            <div className="flex flex-1 items-center bg-gray-50 rounded-lg px-3 py-1 border border-gray-200 focus-within:border-dourado transition-colors">
                <span className="text-xl">🔍</span>
                <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Pesquisar..." className="w-full p-2 bg-transparent outline-none text-gray-700 font-medium" autoFocus />
            </div>

            <div className="flex gap-2 overflow-x-auto scrollbar-hide items-center">
                <button
                    onClick={() => setFiltroCategoria('')}
                    className={`px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-colors border ${filtroCategoria === '' ? 'bg-dourado text-black border-douradoEscuro' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-100'}`}
                >
                    ⭐ Todos
                </button>
                {categoriasUnicas.map(cat => (
                    <button
                        key={cat}
                        onClick={() => setFiltroCategoria(cat)}
                        className={`px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-colors border ${filtroCategoria === cat ? 'bg-gray-800 text-dourado border-black' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-100'}`}
                    >
                        {cat}
                    </button>
                ))}
            </div>
        </div>

        {/* ÁREA PRINCIPAL: Produtos x Carrinho */}
        <div className="flex flex-col md:flex-row gap-4 items-start relative">
          
          <div className="flex-1 w-full order-1">
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-3">
              {produtosFiltrados.map(produto => (
                <div key={produto.id} onClick={()=>adicionarAoCarrinho(produto)} className="bg-white p-3 rounded-xl border border-gray-200 cursor-pointer shadow-sm hover:shadow-md hover:border-dourado transform active:scale-95 transition-all group flex flex-col justify-between min-h-[160px] overflow-hidden">
                  
                  <div className="w-full h-24 mb-2 bg-white rounded-lg overflow-hidden flex-none flex items-center justify-center p-1">
                      <img src={produto.imagem || 'img/logo.jpg'} alt={produto.nome} className="max-w-full max-h-full object-contain group-hover:scale-110 transition-transform duration-300" onError={(e)=>{e.target.src='https://via.placeholder.com/150?text=Sem+Foto'}} />
                  </div>

                  <div className="flex-1">
                      <div className="text-[9px] font-bold text-gray-400 uppercase mb-0.5 truncate">{produto.categoria}</div>
                      <div className="font-bold text-gray-800 text-sm leading-tight group-hover:text-douradoEscuro transition line-clamp-2">{produto.nome}</div>
                  </div>
                  
                  <div className="flex flex-wrap justify-between items-end gap-1 mt-2">
                        <div className="text-green-700 font-black text-lg whitespace-nowrap">{currency(produto.preco)}</div>
                        <div className={`text-[9px] font-bold px-2 py-0.5 rounded-md ${produto.estoque <= 10 ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-600'}`}>
                            Est. {produto.estoque}
                        </div>
                  </div>
                </div>
              ))}
              {produtosFiltrados.length === 0 && (
                  <div className="col-span-full flex flex-col items-center justify-center py-10 text-gray-400">
                      <span className="text-4xl mb-2">📦</span>
                      <span className="font-bold">Nenhum produto encontrado.</span>
                  </div>
              )}
            </div>
          </div>

          <div className="w-full md:w-[320px] lg:w-[350px] xl:w-[400px] flex-none flex flex-col bg-white rounded-xl shadow-[0_-10px_30px_rgba(0,0,0,0.1)] md:shadow-lg border border-gray-200 sticky bottom-0 md:top-4 z-20 order-2 max-h-[50vh] md:max-h-[calc(100vh-140px)]">
             <div className="bg-gray-800 text-dourado p-3 flex justify-between items-center flex-none rounded-t-xl">
                <h3 className="font-bold text-base flex items-center gap-2">🛒 Resumo do Pedido</h3>
                <span className="text-xs bg-gray-700 text-white px-2 py-1 rounded font-bold">{carrinho.length} itens</span>
             </div>
               
             <div className="flex-1 overflow-y-auto p-2 space-y-2 bg-gray-50/50">
                {carrinho.map(item=>(
                    <div key={item.id} className="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex flex-col gap-1">
                        <div className="flex justify-between items-start">
                            <div className="font-bold text-sm text-gray-800 leading-tight flex-1 pr-2 line-clamp-2">{item.nome}</div>
                            <div className="font-bold text-gray-900 text-sm">{currency(item.preco * item.quantidade)}</div>
                        </div>
                        <div className="flex items-center justify-between mt-1">
                            <div className="text-[10px] text-gray-400">{currency(item.preco)} / un</div>
                            <div className="flex items-center gap-1 bg-gray-100 rounded-lg p-0.5 border border-gray-200">
                                <button onClick={(e)=>{e.stopPropagation(); alterarQuantidade(item.id, item.quantidade - 1)}} className="w-6 h-6 flex items-center justify-center bg-white rounded text-gray-700 font-bold hover:text-red-500 hover:bg-red-50">-</button>
                                <span className="font-bold text-sm w-6 text-center">{item.quantidade}</span>
                                <button onClick={(e)=>{e.stopPropagation(); alterarQuantidade(item.id, item.quantidade + 1)}} className="w-6 h-6 flex items-center justify-center bg-white rounded text-gray-700 font-bold hover:text-green-500 hover:bg-green-50">+</button>
                            </div>
                        </div>
                    </div>
                ))}
                {carrinho.length===0 && (
                    <div className="h-full flex flex-col items-center justify-center text-gray-300 opacity-60 py-6 min-h-[100px]">
                        <span className="text-4xl mb-2">🛒</span>
                        <span className="text-sm font-medium">Cesta Vazia</span>
                    </div>
                )}
             </div>

             <div className="p-3 bg-white border-t border-gray-200 flex-none z-10 rounded-b-xl shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
                <div className="flex justify-between items-center mb-3 bg-gray-50 p-2 rounded-lg border border-gray-100">
                    <span className="text-gray-500 text-xs font-bold uppercase tracking-wider">Total</span>
                    <span className="text-2xl font-black text-gray-800">{currency(totalCarrinho)}</span>
                </div>
                
                {mesaAtiva ? (
                    <div className="flex flex-col gap-2">
                        <div className="bg-indigo-50 text-indigo-700 text-center py-1.5 rounded-lg text-sm font-bold border border-indigo-200">
                            Anotar na: {mesaAtiva.toUpperCase()}
                        </div>
                        <button onClick={enviarPedidoMesa} disabled={carrinho.length === 0} className="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold shadow-md hover:bg-indigo-700 transition disabled:opacity-50 text-sm uppercase tracking-wider">
                            🚀 ENVIAR PEDIDO
                        </button>
                    </div>
                ) : (
                    <>
                        <button onClick={abrirComanda} disabled={carrinho.length === 0} className="w-full py-2 mb-2 rounded-lg font-bold bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-200 transition disabled:opacity-50 text-xs uppercase tracking-wide">
                            Abrir Comanda
                        </button>
                        
                        <div className="flex gap-2">
                            <button onClick={handleClickFiado} disabled={carrinho.length === 0} className="flex-1 py-3 rounded-lg font-bold bg-orange-500 text-white shadow-md hover:bg-orange-600 transition disabled:opacity-50 text-xs uppercase">
                                Fiado
                            </button>
                            <button onClick={handleClickPagar} disabled={carrinho.length === 0} className="flex-[2] py-3 rounded-lg font-bold bg-green-600 text-white shadow-md hover:bg-green-700 transition disabled:opacity-50 text-sm uppercase tracking-wide">
                                Receber
                            </button>
                        </div>
                    </>
                )}
             </div>
          </div>
        </div>

        {modalFiadoOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden">
                    <div className="bg-orange-500 p-4"><h3 className="text-white font-bold text-lg">Selecione o Cliente</h3></div>
                    <div className="p-6">
                        <select value={selectedClienteId} onChange={(e) => setSelectedClienteId(e.target.value)} className="w-full p-3 border-2 border-orange-200 rounded-lg bg-orange-50 text-lg font-medium outline-none mb-6">
                            <option value="">-- Selecione um Cliente --</option>
                            {fiados.map(f => (<option key={f.id} value={f.id}>{f.nome}</option>))}
                        </select>
                        <div className="flex gap-3">
                            <button onClick={() => setModalFiadoOpen(false)} className="flex-1 py-3 border border-gray-300 rounded-lg text-gray-600 font-bold text-sm hover:bg-gray-50">Cancelar</button>
                            <button onClick={confirmarSelecaoFiado} disabled={!selectedClienteId} className="flex-1 py-3 bg-orange-600 text-white rounded-lg font-bold text-sm hover:bg-orange-700 disabled:opacity-50">Confirmar</button>
                        </div>
                    </div>
                </div>
            </div>
        )}

        {/* MODAL DE PAGAMENTO (AGORA COM CÁLCULO DE TROCO) */}
        {modalPagamentoOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
                    <div className="bg-green-600 p-5 flex justify-between items-center">
                        <h3 className="text-white font-bold text-lg">Finalizar Venda</h3>
                        <div className="text-green-100 font-bold text-xl">{currency(totalCarrinho)}</div>
                    </div>
                    <div className="p-6">
                        {modoDinheiro ? (
                            <div className="animate-fade-in text-center">
                                <h4 className="text-xl font-bold mb-4 text-gray-800">Pagamento em Dinheiro</h4>
                                <input 
                                    type="number" 
                                    step="0.01" 
                                    value={valorRecebido} 
                                    onChange={e => setValorRecebido(e.target.value)} 
                                    className="w-full p-4 text-3xl text-center border-2 border-green-500 rounded-xl mb-4 outline-none focus:ring-4 focus:ring-green-100" 
                                    placeholder="Valor entregue" 
                                    autoFocus 
                                />
                                {valorRecebido && troco >= 0 && (
                                    <div className="mb-6 p-4 bg-green-100 rounded-xl border border-green-300">
                                        <div className="text-sm text-green-700 font-bold uppercase">Troco:</div>
                                        <div className="text-5xl font-extrabold text-green-700">{currency(troco)}</div>
                                    </div>
                                )}
                                <div className="flex gap-3 mt-4">
                                    <button onClick={() => { setModoDinheiro(false); setValorRecebido(''); }} className="flex-1 py-4 bg-gray-200 rounded-xl font-bold hover:bg-gray-300 transition">Voltar</button>
                                    <button onClick={() => confirmarPagamento('Dinheiro')} disabled={!valorRecebido || troco < 0} className="flex-1 py-4 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 disabled:opacity-50 transition">Confirmar</button>
                                </div>
                            </div>
                        ) : (
                            <>
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    <button onClick={()=>setModoDinheiro(true)} className="p-4 border-2 border-gray-200 bg-gray-50 rounded-xl hover:border-green-500 hover:bg-green-50 flex flex-col items-center gap-2 transition group">
                                        <span className="text-2xl">💵</span><span className="font-bold text-sm text-gray-700">Dinheiro</span>
                                    </button>
                                    <button onClick={()=>confirmarPagamento('Pix')} className="p-4 border-2 border-gray-200 bg-gray-50 rounded-xl hover:border-teal-500 hover:bg-teal-50 flex flex-col items-center gap-2 transition group">
                                        <span className="text-2xl">💠</span><span className="font-bold text-sm text-gray-700">Pix</span>
                                    </button>
                                    <button onClick={()=>confirmarPagamento('Débito')} className="p-4 border-2 border-gray-200 bg-gray-50 rounded-xl hover:border-blue-500 hover:bg-blue-50 flex flex-col items-center gap-2 transition group">
                                        <span className="text-2xl">💳</span><span className="font-bold text-sm text-gray-700">Débito</span>
                                    </button>
                                    <button onClick={()=>confirmarPagamento('Crédito')} className="p-4 border-2 border-gray-200 bg-gray-50 rounded-xl hover:border-purple-500 hover:bg-purple-50 flex flex-col items-center gap-2 transition group">
                                        <span className="text-2xl">💳</span><span className="font-bold text-sm text-gray-700">Crédito</span>
                                    </button>
                                </div>
                                <button onClick={() => setModalPagamentoOpen(false)} className="w-full py-3 border border-gray-300 rounded-lg text-gray-500 font-bold text-sm hover:bg-gray-50">Cancelar e Voltar</button>
                            </>
                        )}
                    </div>
                </div>
            </div>
        )}
      </div>
    );
  }
  
  /* ================= COMPONENTE: COMANDAS ================= */
  function ComandasView({ comandas, fecharComandaEGerarVenda, consumirItemPrePago, produtos, adicionarItemComanda }){
  const [showAdd, setShowAdd] = useState(null); 
  const [buscaProd, setBuscaProd] = useState('');
  
  const comandasAbertas = comandas.filter(c => c.status === 'Aberta');
  const produtosFiltrados = produtos.filter(p => p.nome.toLowerCase().includes(buscaProd.toLowerCase()) && p.estoque > 0);

  return (
    <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
      <h2 className="text-2xl font-bold text-gray-800 border-b pb-3 flex items-center gap-3">
        <span className="text-3xl">💳</span> Comandas Abertas Antigas
      </h2>
      
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
        {comandasAbertas.map(c => (
          <div key={c.id} className="bg-white rounded-xl shadow-lg border-t-4 border-indigo-500 flex flex-col relative">
            <div className="p-4 border-b border-gray-100 bg-white sticky top-0 z-10">
                <div className="flex justify-between items-start">
                    <h3 className="font-bold text-lg text-gray-800">{c.nomeCliente}</h3>
                    <span className="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded">{c.mesaFixa}</span>
                </div>
                <div className="text-xs text-gray-400 mt-1">Total acumulado: <span className="font-bold text-gray-700">{currency(c.valorInicial)}</span></div>
            </div>
            
            <div className="p-4 flex-1 space-y-2 bg-gray-50/50 max-h-[300px] overflow-y-auto">
              <div className="flex justify-between items-center mb-2">
                <h4 className="font-bold text-xs text-gray-500 uppercase tracking-wide">Itens no Consumo</h4>
                <button 
                  onClick={() => setShowAdd(showAdd === c.id ? null : c.id)}
                  className="text-[10px] bg-indigo-600 text-white px-2 py-1 rounded-md font-bold hover:bg-indigo-700"
                >
                  {showAdd === c.id ? '✖ FECHAR' : '➕ ADICIONAR ITEM'}
                </button>
              </div>

              {/* Seletor de novos produtos interno ao card */}
              {showAdd === c.id && (
                <div className="bg-white p-2 border border-indigo-200 rounded-lg mb-4 shadow-inner">
                  <input 
                    placeholder="Buscar produto..." 
                    className="w-full p-2 text-sm border rounded mb-2 outline-none focus:border-indigo-500"
                    value={buscaProd}
                    onChange={(e) => setBuscaProd(e.target.value)}
                  />
                  <div className="max-h-32 overflow-y-auto">
                    {produtosFiltrados.slice(0, 5).map(p => (
                      <div 
                        key={p.id} 
                        onClick={() => { adicionarItemComanda(c.id, p); setBuscaProd(''); }}
                        className="p-2 text-xs hover:bg-indigo-50 cursor-pointer border-b flex justify-between items-center"
                      >
                        <span className="font-bold">{p.nome}</span>
                        <span className="text-green-600 font-bold">{currency(p.preco)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {c.itensPrePagos.map(item => (
                <div key={item.id} className="flex justify-between items-center py-2 border-b border-gray-200 last:border-0">
                  <div className="flex flex-col">
                    <span className="font-medium text-gray-700 text-sm">{item.nome}</span>
                    <span className="text-[10px] text-gray-400">Total: {item.quantidadeTotal} un.</span>
                  </div>
                  <div className="flex items-center gap-3">
                      <span className={`font-bold text-base ${item.quantidadeDisponivel > 0 ? 'text-green-600' : 'text-gray-300'}`}>
                        {item.quantidadeDisponivel}
                      </span>
                      {item.quantidadeDisponivel > 0 && (
                        <button 
                          onClick={() => { if(confirm('Lançar consumo de 1 unidade?')) consumirItemPrePago(c.id, item.id, 1); }} 
                          className="px-3 py-1 bg-white border border-green-500 text-green-600 hover:bg-green-50 rounded text-xs font-bold uppercase"
                        >
                          Usar
                        </button>
                      )}
                  </div>
                </div>
              ))}
            </div>
            
            <div className="p-4 bg-white border-t border-gray-200">
                <button 
                  onClick={() => fecharComandaEGerarVenda(c)} 
                  className="w-full py-3 bg-gray-800 text-white rounded-lg hover:bg-gray-900 transition font-semibold shadow text-sm uppercase"
                >
                  Fechar Conta {currency(c.valorInicial)}
                </button>
            </div>
          </div>
        ))}
        {comandasAbertas.length === 0 && (
          <div className="md:col-span-3 text-center text-gray-400 p-12 border-2 border-dashed border-gray-300 rounded-2xl bg-gray-50">
            Nenhuma comanda antiga aberta.
          </div>
        )}
      </div>
    </div>
  );
}

  /* ================= COMPONENTE: PRODUTOS ================= */
  function ProdutosView({produtos, user}){
    // Incluímos o campo de 'imagem' no estado
    const [form, setForm] = useState({ id:null, nome:'', preco:'', estoque:'', categoria:'Outros', imagem: '' });
    const [search, setSearch] = useState('');
    const [filterCat, setFilterCat] = useState('');
    const [filterEstoque, setFilterEstoque] = useState('');
    const { addDoc, collection, updateDoc, doc, deleteDoc } = window.firebaseMethods;
    const db = window.db;

    async function submit(e){
      e.preventDefault();
      if(!form.nome || !form.preco || !form.estoque) return alert('Preencha os campos obrigatórios');
