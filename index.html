      const produtoData = { ...form, preco: Number(form.preco), estoque: Number(form.estoque), status: 'Normal' };
      
      if(form.id) {
          delete produtoData.id;
          await updateDoc(doc(db, "produtos", form.id), produtoData);
      } else {
          delete produtoData.id;
          await addDoc(collection(db, "produtos"), produtoData);
      }
      setForm({ id:null, nome:'', preco:'', estoque:'', categoria:'Outros', imagem: '' });
    }
    
    function editar(p){ setForm({...p, preco: String(p.preco), estoque: String(p.estoque), imagem: p.imagem || ''}); }
    async function excluir(p){ if(!confirm(`Excluir ${p.nome}?`)) return; await deleteDoc(doc(db, "produtos", p.id)); }

    const produtosFiltrados = produtos.filter(p => {
        const matchName = p.nome.toLowerCase().includes(search.toLowerCase());
        const matchCat = filterCat === '' || p.categoria === filterCat;
        
        let matchEstoque = true;
        if (filterEstoque === 'baixo') matchEstoque = p.estoque > 0 && p.estoque < 10;
        else if (filterEstoque === 'zerado') matchEstoque = p.estoque === 0;
        else if (filterEstoque === 'normal') matchEstoque = p.estoque >= 10;
        
        return matchName && matchCat && matchEstoque;
    });

    if (user.role !== 'admin') return <div className="p-6 bg-yellow-50 text-yellow-800 m-4 rounded-xl text-center font-bold">Acesso restrito a administradores.</div>;

    return (
      <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 animate-fade-in w-full max-w-[1600px] mx-auto">
        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit">
          <h3 className="font-bold text-lg mb-4 text-gray-800 border-b pb-2">{form.id ? '✏️ Editar' : '✨ Novo'} Produto</h3>
          <form onSubmit={submit} className="space-y-4">
            <div>
                <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Nome do Produto</label>
                <input value={form.nome} onChange={e=>setForm({...form, nome:e.target.value})} className="w-full p-2 border rounded-lg mt-1 outline-none focus:border-indigo-500 transition h-10 text-base" required />
            </div>
            <div className="grid grid-cols-2 gap-4">
                <div>
                    <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Preço (R$)</label>
                    <input value={form.preco} onChange={e=>setForm({...form, preco:e.target.value})} type="number" step="0.01" className="w-full p-2 border rounded-lg mt-1 outline-none focus:border-indigo-500 transition h-10 text-base" required />
                </div>
                <div>
                    <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Estoque</label>
                    <input value={form.estoque} onChange={e=>setForm({...form, estoque:e.target.value})} type="number" className="w-full p-2 border rounded-lg mt-1 outline-none focus:border-indigo-500 transition h-10 text-base" required />
                </div>
            </div>
            <div>
                <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Categoria</label>
                <select value={form.categoria} onChange={e=>setForm({...form, categoria:e.target.value})} className="w-full p-2 border rounded-lg mt-1 outline-none focus:border-indigo-500 transition bg-white h-10 text-base">
                    {CATEGORIAS_PADRAO.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                </select>
            </div>
            <div>
                <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Caminho da Imagem (GitHub)</label>
                <input value={form.imagem} onChange={e=>setForm({...form, imagem:e.target.value})} placeholder="Ex: img/produto.png" className="w-full p-2 border rounded-lg mt-1 outline-none focus:border-indigo-500 transition h-10 text-base" />
            </div>
            <button className="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold shadow hover:bg-indigo-700 transition transform active:scale-95 text-sm uppercase">
                {form.id ? 'Atualizar Produto' : 'Adicionar ao Estoque'}
            </button>
            {form.id && <button type="button" onClick={()=>setForm({ id:null, nome:'', preco:'', estoque:'', categoria:'Outros', imagem: '' })} className="w-full py-2 text-gray-500 text-xs hover:underline">Cancelar Edição</button>}
          </form>
        </div>
        
        <div className="xl:col-span-2 flex flex-col gap-4">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row gap-3 items-center">
                <div className="flex-1 relative w-full">
                    <span className="absolute left-3 top-3 text-gray-400 text-sm">🔍</span>
                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar nome..." className="w-full pl-9 p-2 border rounded-lg outline-none focus:border-indigo-500 h-11 text-base" />
                </div>
                
                <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="w-full md:w-auto p-2 border rounded-lg bg-gray-50 outline-none h-11 text-base">
                    <option value="">Todas Categorias</option>
                    {CATEGORIAS_PADRAO.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                </select>

                <select value={filterEstoque} onChange={e=>setFilterEstoque(e.target.value)} className="w-full md:w-auto p-2 border rounded-lg bg-gray-50 outline-none h-11 text-base font-medium">
                    <option value="">Status Estoque (Todos)</option>
                    <option value="baixo">⚠️ Baixo (&lt; 10)</option>
                    <option value="zerado">🛑 Zerado (0)</option>
                    <option value="normal">✅ Normal</option>
                </select>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex-1">
              <div className="overflow-x-auto">
                <table className="w-full text-base">
                  <thead className="bg-gray-50 text-gray-600 border-b"><tr><th className="p-4 text-left">Produto</th><th className="p-4 text-right">Preço</th><th className="p-4 text-right">Estoque</th><th className="p-4 text-center">Ações</th></tr></thead>
                  <tbody className="divide-y divide-gray-100">
                    {produtosFiltrados.map(p => (
                        <tr key={p.id} className="hover:bg-gray-50 transition">
                        <td className="p-4 font-medium text-gray-800 flex items-center gap-3">
                            <img src={p.imagem || 'img/logo.jpg'} alt="img" className="w-8 h-8 rounded object-cover border" onError={(e)=>{e.target.src='https://via.placeholder.com/50'}}/>
                            <span>{p.nome} <span className="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded ml-2 hidden sm:inline-block">{p.categoria}</span></span>
                        </td>
                        <td className="p-4 text-right font-bold text-gray-700">{currency(p.preco)}</td>
                        <td className="p-4 text-right">
                            <span className={`px-2 py-1 rounded text-xs font-bold ${
                                p.estoque === 0 ? 'bg-red-200 text-red-800 border border-red-300' :
                                p.estoque < 10 ? 'bg-yellow-100 text-yellow-800 border border-yellow-200' : 
                                'bg-green-100 text-green-700'
                            }`}>
                                {p.estoque === 0 ? 'ESGOTADO' : `${p.estoque} un.`}
                            </span>
                        </td>
                        <td className="p-4 text-right font-bold text-indigo-600 bg-indigo-50/30">
                            {currency(p.preco * p.estoque)}
                        </td>
                        <td className="p-4 text-center space-x-2">
                            <button onClick={()=>editar(p)} className="text-indigo-600 hover:text-indigo-800 font-bold text-xs uppercase border border-indigo-200 px-3 py-1 rounded">Editar</button>
                            <button onClick={()=>excluir(p)} className="text-red-500 hover:text-red-700 font-bold text-xs uppercase border border-red-200 px-3 py-1 rounded">Excluir</button>
                        </td>
                        </tr>
                    ))}
                    </tbody>
                </table>
              </div>
            </div>
        </div>
      </div>
    );
  }
  
  /* ================= COMPONENTE: RELATÓRIOS ================= */
  function Grafico({ type, data, options, title }) {
      const chartRef = useRef(null);
      const canvasRef = useRef(null);

      useEffect(() => {
          if (chartRef.current) chartRef.current.destroy();
          if (canvasRef.current) chartRef.current = new Chart(canvasRef.current, { type, data, options });
          return () => { if(chartRef.current) chartRef.current.destroy(); }
      }, [data]);

      return (
          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-full flex flex-col">
              <h4 className="font-bold text-gray-700 mb-4 text-sm uppercase tracking-wide">{title}</h4>
              <div className="flex-1 relative" style={{minHeight:'250px'}}>
                  <canvas ref={canvasRef}></canvas>
              </div>
          </div>
      );
  }

  function RelatoriosView({ vendas, produtos, user }) {
    if (user.role !== 'admin') return <div className="p-10 text-center font-bold text-red-500">Acesso Negado.</div>;
    
    // FILTRO AUTOMÁTICO PARA O MÊS ATUAL
    const vendasDoMes = useMemo(() => {
        const dataAtual = new Date();
        const mesAtual = dataAtual.getMonth();
        const anoAtual = dataAtual.getFullYear();
        
        return vendas.filter(v => {
            if (!v.data) return false;
            const d = new Date(v.data);
            return d.getMonth() === mesAtual && d.getFullYear() === anoAtual;
        });
    }, [vendas]);

    const dataPagamento = useMemo(() => {
        const counts = { 'Dinheiro': 0, 'Pix': 0, 'Débito': 0, 'Crédito': 0, 'Fiado': 0 };
        vendasDoMes.forEach(v => { const tipo = v.tipoPagamento || 'Dinheiro'; counts[tipo] = (counts[tipo] || 0) + v.total; });
        return {
            labels: Object.keys(counts),
            datasets: [{
                data: Object.values(counts),
                backgroundColor: ['#16a34a', '#0d9488', '#2563eb', '#9333ea', '#ea580c'],
                borderWidth: 0
            }]
        };
    }, [vendasDoMes]);

    const dataVendasDia = useMemo(() => {
        const map = {};
        vendasDoMes.forEach(v => { const day = (v.data || '').split('T')[0]; if(day) map[day] = (map[day] || 0) + v.total; });
        const labels = Object.keys(map).sort().slice(-7); 
        const values = labels.map(d => map[d]);
        return {
            labels: labels.map(l => l.split('-').reverse().join('/')),
            datasets: [{ label: 'Vendas (R$)', data: values, backgroundColor: '#D4AF37', borderRadius: 6 }]
        };
    }, [vendasDoMes]);

    const stats = useMemo(() => {
        const totalVendas = vendasDoMes.reduce((acc, v) => acc + v.total, 0);
        // O Patrimônio calcula o estoque de hoje (não entra no filtro de mês)
        const patrimônio = produtos.reduce((acc, p) => acc + (p.preco * p.estoque), 0);
        const ticketMedio = vendasDoMes.length > 0 ? totalVendas / vendasDoMes.length : 0;
        return { totalVendas, patrimônio, ticketMedio, qtd: vendasDoMes.length };
    }, [vendasDoMes, produtos]);

    // Pega o nome do mês atual para exibir na tela (ex: "fevereiro")
    const nomeMes = new Date().toLocaleString('pt-BR', { month: 'long' });

    return (
      <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-3 flex items-center gap-2">
            📊 Dashboard Geral 
            <span className="text-sm bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full ml-2 uppercase tracking-wider font-bold">
                Mês de {nomeMes}
            </span>
        </h2>
        
        {/* CARDS PRINCIPAIS */}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-indigo-600">
                <div className="text-xs text-gray-400 font-bold uppercase tracking-wider">Faturamento ({nomeMes})</div>
                <div className="text-2xl font-black text-indigo-700 mt-2">{currency(stats.totalVendas)}</div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-emerald-500">
                <div className="text-xs text-gray-400 font-bold uppercase tracking-wider">Vendas ({nomeMes})</div>
                <div className="text-2xl font-black text-emerald-700 mt-2">{stats.qtd}</div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-dourado">
                <div className="text-xs text-gray-400 font-bold uppercase tracking-wider">Ticket Médio</div>
                <div className="text-2xl font-black text-yellow-700 mt-2">{currency(stats.ticketMedio)}</div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500 bg-purple-50/30">
                <div className="text-xs text-purple-600 font-bold uppercase tracking-wider">Patrimônio (Estoque)</div>
                <div className="text-2xl font-black text-purple-700 mt-2">{currency(stats.patrimônio)}</div>
            </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Grafico title={`Vendas por Método (${nomeMes})`} type="doughnut" data={dataPagamento} options={{ maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }} />
            <Grafico title="Evolução (Últimos 7 dias do mês)" type="bar" data={dataVendasDia} options={{ maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }} />
        </div>

        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h3 className="font-bold mb-4 text-gray-700 text-base">Histórico Recente ({nomeMes})</h3>
            <div className="overflow-x-auto max-h-64 overflow-y-auto">
                <table className="w-full text-sm md:text-base">
                    <thead className="sticky top-0 bg-white shadow-sm"><tr className="text-gray-600 border-b"><th className="p-3 text-left">Data</th><th className="p-3 text-left">Pagamento</th><th className="p-3 text-right">Total Vendido</th></tr></thead>
                    <tbody className="divide-y">
                        {vendasDoMes.slice().reverse().slice(0, 10).map(v => (
                            <tr key={v.id} className="hover:bg-gray-50">
                                <td className="p-3 text-gray-600 text-xs">{new Date(v.data).toLocaleString()}</td>
                                <td className="p-3 font-medium text-sm">{v.tipoPagamento}</td>
                                <td className="p-3 text-right font-bold text-green-600">{currency(v.total)}</td>
                            </tr>
                        ))}
                        {vendasDoMes.length === 0 && (
                            <tr><td colSpan="3" className="p-6 text-center text-gray-400">Nenhuma venda registrada neste mês ainda.</td></tr>
                        )}
                    </tbody>
                </table>
            </div>
        </div>
      </div>
    );
  }

  function RelatorioAvancado({ vendas, produtos, users }) { 
    // Calcula dinamicamente as datas para preencher os inputs (Últimos 90 dias)
    const hoje = new Date();
    const noventaDiasAtras = new Date();
    noventaDiasAtras.setDate(hoje.getDate() - 90);

    const [from, setFrom] = useState(noventaDiasAtras.toISOString().split('T')[0]);
    const [to, setTo] = useState(hoje.toISOString().split('T')[0]);
    const [filtroUsuario, setFiltroUsuario] = useState('');
    
    // Deixa o resultado já aberto para a vitrine
    const [mostrarResultados, setMostrarResultados] = useState(true);
    
    const { deleteDoc, doc } = window.firebaseMethods;
    const db = window.db;

    const vendasFiltradas = useMemo(() => {
      let filtered = vendas;
      if (from) filtered = filtered.filter(v => (v.data || '').split('T')[0] >= from);
      if (to) filtered = filtered.filter(v => (v.data || '').split('T')[0] <= to);
      if (filtroUsuario) filtered = filtered.filter(v => v.vendedor === filtroUsuario);
      return filtered;
    }, [vendas, from, to, filtroUsuario]);

    const vendasPorVendedor = useMemo(() => {
        const grupo = {};
        vendasFiltradas.forEach(v => { 
            const vend = v.vendedor || 'Sistema'; 
            if(!grupo[vend]) grupo[vend] = { total: 0, vendas: [] }; 
            grupo[vend].vendas.push(v); 
            grupo[vend].total += v.total; 
        });
        return grupo;
    }, [vendasFiltradas]);

    const totalGeralPeriodo = vendasFiltradas.reduce((acc, v) => acc + v.total, 0);

    async function limparDadosPorData() {
        if (!to) return alert("Selecione a data 'Até' para saber quais dados antigos apagar.");
        if (!confirm(`Apagar DEFINITIVAMENTE dados antigos até ${to.split('-').reverse().join('/')}?`)) return;
        
        const vendasParaApagar = vendas.filter(v => (v.data || '').split('T')[0] <= to);
        for (const venda of vendasParaApagar) { await deleteDoc(doc(db, "vendas", venda.id)); }
        alert("Limpeza concluída. Banco de dados está mais leve!"); setMostrarResultados(false);
    }

    function handleFiltrar() {
        if (!from || !to) return alert("Preencha as datas 'De' e 'Até' antes de filtrar.");
        setMostrarResultados(true);
    }

    return (
      <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-3">📈 Relatório Avançado</h2>
        
        <div className="bg-white border p-6 rounded-xl shadow-sm no-print flex flex-wrap gap-4 items-end">
            <label className="block w-full sm:w-auto">
                <span className="text-xs font-bold text-gray-500 uppercase block mb-1">De</span>
                <input type="date" value={from} onChange={e=>{setFrom(e.target.value); setMostrarResultados(false);}} className="w-full p-2 border rounded-lg h-10 outline-none focus:border-indigo-500" />
            </label>
            <label className="block w-full sm:w-auto">
                <span className="text-xs font-bold text-gray-500 uppercase block mb-1">Até</span>
                <input type="date" value={to} onChange={e=>{setTo(e.target.value); setMostrarResultados(false);}} className="w-full p-2 border rounded-lg h-10 outline-none focus:border-indigo-500" />
            </label>
            <label className="block w-full sm:w-auto min-w-[200px]">
                <span className="text-xs font-bold text-gray-500 uppercase block mb-1">Vendedor</span>
                <select value={filtroUsuario} onChange={e => {setFiltroUsuario(e.target.value); setMostrarResultados(false);}} className="w-full p-2 border rounded-lg bg-white h-10 text-sm outline-none focus:border-indigo-500">
                    <option value="">Todos</option>
                    {users.map(u => <option key={u.id} value={u.username}>{u.username}</option>)}
                </select>
            </label>
            
            <div className="flex gap-3 ml-auto w-full sm:w-auto">
                <button onClick={handleFiltrar} className="flex-1 py-2 px-6 bg-indigo-600 text-white font-bold rounded-lg text-sm hover:bg-indigo-700 transition">🔍 Filtrar</button>
                <button onClick={()=>window.print()} disabled={!mostrarResultados} className="flex-1 py-2 px-6 bg-gray-800 text-white font-bold rounded-lg text-sm disabled:opacity-50">Imprimir</button>
                <button onClick={limparDadosPorData} className="flex-1 py-2 px-6 bg-red-100 text-red-700 font-bold rounded-lg border border-red-200 text-sm hover:bg-red-200 transition">Limpar Antigos</button>
            </div>
        </div>

        {mostrarResultados ? (
            <div id="relatorio-print-area" className="space-y-6 animate-fade-in">
                {vendasFiltradas.length === 0 ? (
                     <div className="text-center p-10 bg-gray-50 border border-dashed rounded-xl text-gray-500 font-medium">Nenhuma venda encontrada nesse período.</div>
                ) : (
                    <>
                        <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-dourado text-center md:text-left flex flex-col md:flex-row justify-between items-center">
                            <div>
                                <h3 className="font-bold text-2xl text-gray-800 mb-2">Resumo do Período</h3>
                                <div className="text-sm text-gray-500">De {from.split('-').reverse().join('/')} até {to.split('-').reverse().join('/')}</div>
                            </div>
                            <div className="text-5xl font-black text-gray-800 mt-4 md:mt-0 bg-gray-50 px-6 py-3 rounded-xl border border-gray-100">{currency(totalGeralPeriodo)}</div>
                        </div>
                        
                        {Object.keys(vendasPorVendedor).map(vendedor => (
                            <div key={vendedor} className="mb-8 break-page bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                <div className="bg-gray-50 p-4 border-b border-gray-200 flex justify-between font-bold text-lg">
                                    <span>👤 {vendedor}</span>
                                    <span>{currency(vendasPorVendedor[vendedor].total)}</span>
                                </div>
                                <table className="w-full text-sm md:text-base print-table">
                                    <thead className="bg-white text-gray-500"><tr><th className="p-3 text-left">Data</th><th className="p-3 text-left">Descrição</th><th className="p-3 text-right">Valor</th></tr></thead>
                                    <tbody className="divide-y">{vendasPorVendedor[vendedor].vendas.map(v => (
                                        <tr key={v.id}><td className="p-3">{new Date(v.data).toLocaleString()}</td><td className="p-3">{v.origem}</td><td className="p-3 text-right">{currency(v.total)}</td></tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        ))}
                    </>
                )}
            </div>
        ) : (
            <div className="text-center p-12 bg-white border border-gray-200 rounded-xl shadow-sm text-gray-400">
                <span className="text-5xl block mb-4">📅</span>
                <span className="text-lg font-medium block text-gray-600">A tela está limpa.</span>
            </div>
        )}
      </div>
    );
  }

  /* ================= APP PRINCIPAL ================= */
  /* ================= APP PRINCIPAL ================= */
  function App(){
    const [user, setUser] = useState(null);
    const [loading, setLoading] = useState(true);
    
    // Controle do Menu (Aberto no PC, Fechado no Celular)
    const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 768);
    
    // Dados Globais (Firebase)
    const [produtos, setProdutos] = useState([]);
    const [vendas, setVendas] = useState([]);
    const [comandas, setComandas] = useState([]);
    const [fiados, setFiados] = useState([]);
    const [users, setUsers] = useState([]);
    const [avarias, setAvarias] = useState([]); 
    const [pedidos, setPedidos] = useState([]); 
    
    // Estado Local (PDV)
    const [carrinho, setCarrinho] = useState([]);
    const [busca, setBusca] = useState('');
    const [selected, setSelected] = useState('pdv');
    const [mesaAtiva, setMesaAtiva] = useState(null);

    // Puxando os métodos do Firebase configurados lá no topo
    const { collection, onSnapshot, addDoc, updateDoc, doc, auth, onAuthStateChanged, signOut } = window.firebaseMethods;
    const db = window.db;

    // 1. Monitora quem está logado de forma segura pelo Google Firebase Auth
    useEffect(() => {
        if (!auth) return;
        const unsubscribeAuth = onAuthStateChanged(auth, (firebaseUser) => {
            if (firebaseUser) {
                // Se está logado, procura qual o cargo (role) dele na nossa lista de usuários do banco
                const usuarioEncontrado = users.find(u => u.username.toLowerCase() === firebaseUser.email.toLowerCase());
                if(usuarioEncontrado) {
                    setUser(usuarioEncontrado);
                } else {
                    // Se não achou na lista (ex: primeiro acesso ou dono), ganha admin temporário
                    setUser({ id: firebaseUser.uid, username: firebaseUser.email, role: 'admin' });
                }
            } else {
                setUser(null);
            }
        });
        return () => unsubscribeAuth();
    }, [users, auth]);

    // 2. Busca todos os dados do banco em tempo real
    useEffect(() => {
      const unsubProdutos = onSnapshot(collection(db, "produtos"), (snap) => setProdutos(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      const unsubVendas = onSnapshot(collection(db, "vendas"), (snap) => setVendas(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      const unsubComandas = onSnapshot(collection(db, "comandas"), (snap) => setComandas(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      const unsubFiados = onSnapshot(collection(db, "fiados"), (snap) => setFiados(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      
      const unsubUsers = onSnapshot(collection(db, "users"), (snap) => {
          const fetchedUsers = snap.docs.map(d => ({ ...d.data(), id: d.id }));
          setUsers(fetchedUsers);
      });

      const unsubAvarias = onSnapshot(collection(db, "avarias"), (snap) => setAvarias(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      const unsubPedidos = onSnapshot(collection(db, "pedidos"), (snap) => setPedidos(snap.docs.map(d => ({ ...d.data(), id: d.id })))); 

      setLoading(false);
      return () => { unsubProdutos(); unsubVendas(); unsubComandas(); unsubFiados(); unsubUsers(); unsubAvarias(); unsubPedidos(); };
    }, []);

    // FUNÇÕES DE AÇÃO GERAIS
    function handleLogout() {
        signOut(auth).then(() => {
            setUser(null);
        });
    }

    async function transferirPedidoMesa(mesaOrigem, mesaDestino) {
        if(!confirm(`Confirma a transferência da ${mesaOrigem} para a ${mesaDestino}?`)) return;
        const pedidosMesa = pedidos.filter(p => p.nomeCliente === mesaOrigem && p.status !== 'Vendido');
        
        for (const p of pedidosMesa) {
            await updateDoc(doc(db, "pedidos", p.id), { nomeCliente: mesaDestino });
        }

        alert(`Sucesso! Pedidos transferidos para a ${mesaDestino}.`);
        setMesaAtiva(null);
        setSelected('mapa_mesas');
    }

    async function fecharContaMesa(nomeMesa, pedidosDaMesa, total, metodoPagamento = 'Dinheiro') {
        if(!confirm(`Confirma fechamento de ${nomeMesa} via ${metodoPagamento}?`)) return;

        const itensConsolidados = [];
        
        for (const p of pedidosDaMesa) {
            itensConsolidados.push(...p.itens);
            await updateDoc(doc(db, "pedidos", p.id), { status: 'Vendido' });
        }
        
        await addDoc(collection(db, "vendas"), {
            data: new Date().toISOString(),
            itens: itensConsolidados,
            total: total,
            origem: `Fechamento ${nomeMesa}`,
            tipoPagamento: metodoPagamento,
            vendedor: user ? user.username : 'Desconhecido' 
        });

        alert("Conta fechada com sucesso!");
        setMesaAtiva(null);
        setSelected('mapa_mesas');
    }

    async function enviarPedidoMesa() {
        if(carrinho.length === 0) return alert('Carrinho vazio!');
        const total = carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0);

        for (const item of carrinho) {
            const prod = produtos.find(p => p.id === item.id);
            if (prod.estoque < item.quantidade) {
                alert(`Estoque insuficiente de ${item.nome}. Apenas ${prod.estoque} disponíveis.`);
                return;
            }
        }

        carrinho.forEach(async (item) => {
            const prod = produtos.find(p => p.id === item.id);
            await updateDoc(doc(db, "produtos", item.id), { estoque: prod.estoque - item.quantidade });
        });

        await addDoc(collection(db, "pedidos"), {
            data: new Date().toISOString(),
            nomeCliente: mesaAtiva,
            itens: carrinho,
            total: total,
            status: 'Pendente',
            tipo: 'Mesa',
            vendedor: user.username
        });

        setCarrinho([]);
        alert(`Pedido enviado para a ${mesaAtiva}!`);
        setSelected('detalhe_mesa');
    }

    function adicionarAoCarrinho(produto){ 
      const itemExistente = carrinho.find(i=>i.id===produto.id);
      if (produto.estoque <= (itemExistente?.quantidade || 0)) return alert(`Estoque insuficiente!`);
      if(itemExistente) setCarrinho(carrinho.map(i => i.id===produto.id ? {...i, quantidade: i.quantidade+1} : i));
      else setCarrinho([...carrinho, {...produto, quantidade:1}]);
    }
    
    function alterarQuantidade(id, qtd){ 
      const prod = produtos.find(p=>p.id===id);
      if(qtd <= 0) setCarrinho(carrinho.filter(i=>i.id!==id));
      else if (qtd > prod.estoque) alert(`Máximo: ${prod.estoque}`);
      else setCarrinho(carrinho.map(i=> i.id===id ? {...i, quantidade:qtd} : i));
    }

    async function finalizarVenda(metodoSelecionado){
      const total = carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0);
      const vendaData = new Date().toISOString();
      await addDoc(collection(db, "vendas"), { data: vendaData, itens: carrinho, total: total, origem: `PDV Balcão - ${metodoSelecionado}`, tipoPagamento: metodoSelecionado, vendedor: user.username });
      carrinho.forEach(async (item) => { await updateDoc(doc(db, "produtos", item.id), { estoque: item.estoque - item.quantidade }); });
      setCarrinho([]); alert(`Venda finalizada!`);
    }

    async function finalizarFiado(clienteId){
        let cliente = fiados.find(f => f.id == clienteId);
        const total = carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0);
        const vendaData = new Date().toISOString();
        await updateDoc(doc(db, "fiados", cliente.id), {
            saldoDevedor: cliente.saldoDevedor + total,
            historico: [...cliente.historico, { data: vendaData, tipo: 'COMPRA', valor: total, itens: carrinho.map(i=>`${i.quantidade}x ${i.nome}`).join(', ') }]
        });
        await addDoc(collection(db, "vendas"), { data: vendaData, itens: carrinho, total: total, origem: `Fiado - ${cliente.nome}`, tipoPagamento: 'Fiado', vendedor: user.username });
        carrinho.forEach(async (item) => { await updateDoc(doc(db, "produtos", item.id), { estoque: item.estoque - item.quantidade }); });
        setCarrinho([]); alert(`Fiado registrado!`);
    }
    
    async function abrirComanda(){
      const nomeCliente = prompt("Nome do cliente:"); if (!nomeCliente) return;
      carrinho.forEach(async (item) => { await updateDoc(doc(db, "produtos", item.id), { estoque: item.estoque - item.quantidade }); });
      await addDoc(collection(db, "comandas"), { 
          dataAbertura: new Date().toISOString(), 
          nomeCliente: nomeCliente, 
          mesaFixa: `MESA ${comandas.length + 1}`, 
          valorInicial: carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0), 
          status: 'Aberta', 
          itensPrePagos: carrinho.map(i => ({...i, quantidadeTotal: i.quantidade, quantidadeDisponivel: i.quantidade}))
      });
      setCarrinho([]); setSelected('comandas');
    }
    
    async function consumirItemPrePago(comandaId, itemId, qtd) {
        const comanda = comandas.find(c => c.id === comandaId);
        const novosItens = comanda.itensPrePagos.map(i => i.id === itemId ? {...i, quantidadeDisponivel: i.quantidadeDisponivel - qtd} : i);
        await updateDoc(doc(db, "comandas", comandaId), { itensPrePagos: novosItens });
    }
    
    async function fecharComandaEGerarVenda(comanda) {
      if (!confirm(`Confirmar recebimento?`)) return;
      const vendaData = new Date().toISOString();
      await addDoc(collection(db, "vendas"), { data: vendaData, itens: comanda.itensPrePagos, total: comanda.valorInicial, origem: `Comanda ${comanda.nomeCliente}`, tipoPagamento: 'Dinheiro', vendedor: user.username });
      await updateDoc(doc(db, "comandas", comanda.id), { status: 'Fechada', dataFechamento: vendaData });
      alert("Fechada!");
    }

    async function adicionarItemComanda(comandaId, produto) {
        const comanda = comandas.find(c => c.id === comandaId);
        const itemExistente = comanda.itensPrePagos.find(i => i.id === produto.id);
        
        let novosItens;
        if (itemExistente) {
            novosItens = comanda.itensPrePagos.map(i => 
            i.id === produto.id 
                ? { ...i, quantidadeTotal: i.quantidadeTotal + 1, quantidadeDisponivel: i.quantidadeDisponivel + 1 } 
                : i
            );
        } else {
            novosItens = [...comanda.itensPrePagos, { ...produto, quantidadeTotal: 1, quantidadeDisponivel: 1 }];
        }

        await updateDoc(doc(db, "comandas", comandaId), { 
            itensPrePagos: novosItens,
            valorInicial: comanda.valorInicial + produto.preco
        });
        
        await updateDoc(doc(db, "produtos", produto.id), { estoque: produto.estoque - 1 });
    }

    async function registrarAvaria(produtoId, qtd, motivo) {
        const produto = produtos.find(p => p.id === produtoId);
        await updateDoc(doc(db, "produtos", produtoId), { estoque: produto.estoque - qtd });
        await addDoc(collection(db, "avarias"), {
            data: new Date().toISOString(),
            produtoId: produto.id, produtoNome: produto.nome,
            categoria: produto.categoria, qtd: qtd, motivo: motivo,
            valorPerdido: produto.preco * qtd, usuario: user.username
        });
        alert('Registrado!');
    }

    const totalCarrinho = carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0);
    
    if(loading) return <div className="min-h-screen flex items-center justify-center text-dourado text-3xl font-bold animate-pulse">Carregando...</div>;
    
    // Se não estiver logado, mostra a tela de Login
    if(!user) return <Login onLogin={setUser} />;

    return (
      <div className="flex flex-col h-full bg-slate-50 font-sans w-full overflow-hidden">
        <Header user={user} onLogout={handleLogout} onToggleMenu={() => setSidebarOpen(!sidebarOpen)} />
        
        <div className="flex flex-1 w-full overflow-hidden relative">
          
          <Sidebar selected={selected} setSelected={setSelected} user={user} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} setMesaAtiva={setMesaAtiva} />
          
          <main className="flex-1 p-4 md:p-6 overflow-y-auto w-full">
            
            {selected === 'mapa_mesas' && (
                <MapaMesasView 
                    pedidos={pedidos} 
                    selecionarMesa={(nomeMesa) => {
                        setMesaAtiva(nomeMesa);
                        setSelected('detalhe_mesa');
                    }} 
                />
            )}

            {selected === 'detalhe_mesa' && mesaAtiva && (
                <DetalheMesaView 
                    mesa={mesaAtiva} 
                    pedidos={pedidos} 
                    voltarMapa={() => { setMesaAtiva(null); setSelected('mapa_mesas'); }}
                    novoPedido={() => setSelected('pdv')}
                    fecharConta={fecharContaMesa}
                    transferirMesa={transferirPedidoMesa} 
                />
            )}

            {selected === 'pdv' && (
              <PDVView produtos={produtos} adicionarAoCarrinho={adicionarAoCarrinho} busca={busca} setBusca={setBusca}
                    carrinho={carrinho} alterarQuantidade={alterarQuantidade}
                    finalizarVenda={finalizarVenda} finalizarFiado={finalizarFiado}
                    totalCarrinho={totalCarrinho} abrirComanda={abrirComanda} 
                    fiados={fiados} setSelected={setSelected} 
                    mesaAtiva={mesaAtiva} enviarPedidoMesa={enviarPedidoMesa} />
            )}
            
            {selected === 'usuarios' && user.role === 'admin' && <UsuariosView users={users} currentUser={user} />}
            {selected === 'fiado' && <FiadoView fiados={fiados} vendas={vendas} user={user} />}
            {selected === 'comandas' && <ComandasView comandas={comandas} produtos={produtos} adicionarItemComanda={adicionarItemComanda} fecharComandaEGerarVenda={fecharComandaEGerarVenda} consumirItemPrePago={consumirItemPrePago} />}
            {selected === 'intelligence' && <IntelligenceView produtos={produtos} vendas={vendas} user={user} />}
            {selected === 'produtos' && <ProdutosView produtos={produtos} user={user} />}
            {selected === 'relatorios' && <RelatoriosView vendas={vendas} produtos={produtos} user={user} />}
            {selected === 'avancado' && user.role === 'admin' && <RelatorioAvancado vendas={vendas} produtos={produtos} users={users} />}
            {selected === 'avarias' && <AvariasView produtos={produtos} avarias={avarias} registrarAvaria={registrarAvaria} user={user} />}
          </main>
        </div>
      </div>
    );
  }

  ReactDOM.render(<App />, document.getElementById('root'));

  // Registra o PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('App PWA Registrado com sucesso!'))
          .catch(err => console.error('Erro ao registrar PWA:', err));
      });
    }
  </script>
</body>
</html>
