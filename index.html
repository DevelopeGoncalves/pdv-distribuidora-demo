  function Grafico({ type, data, options, title }) {
      const chartRef = useRef(null);
      const canvasRef = useRef(null);

      useEffect(() => {
          if (chartRef.current) chartRef.current.destroy();
          if (canvasRef.current) chartRef.current = new Chart(canvasRef.current, { type, data, options });
          return () => { if(chartRef.current) chartRef.current.destroy(); }
      }, [data]);

      return (
          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-full flex flex-col">
              <h4 className="font-bold text-gray-700 mb-4 text-sm uppercase tracking-wide">{title}</h4>
              <div className="flex-1 relative" style={{minHeight:'250px'}}>
                  <canvas ref={canvasRef}></canvas>
              </div>
          </div>
      );
  }

  function RelatoriosView({ vendas, produtos, user }) {
    if (user.role !== 'admin') return <div className="p-10 text-center font-bold text-red-500">Acesso Negado.</div>;
    
    const dataPagamento = useMemo(() => {
        const counts = { 'Dinheiro': 0, 'Pix': 0, 'Débito': 0, 'Crédito': 0, 'Fiado': 0 };
        vendas.forEach(v => { const tipo = v.tipoPagamento || 'Dinheiro'; counts[tipo] = (counts[tipo] || 0) + v.total; });
        return {
            labels: Object.keys(counts),
            datasets: [{
                data: Object.values(counts),
                backgroundColor: ['#16a34a', '#0d9488', '#2563eb', '#9333ea', '#ea580c'],
                borderWidth: 0
            }]
        };
    }, [vendas]);

    const dataVendasDia = useMemo(() => {
        const map = {};
        vendas.forEach(v => { const day = (v.data || '').split('T')[0]; if(day) map[day] = (map[day] || 0) + v.total; });
        const labels = Object.keys(map).sort().slice(-7); 
        const values = labels.map(d => map[d]);
        return {
            labels: labels.map(l => l.split('-').reverse().join('/')),
            datasets: [{ label: 'Vendas (R$)', data: values, backgroundColor: '#D4AF37', borderRadius: 6 }]
        };
    }, [vendas]);

    const stats = useMemo(() => {
        const totalVendas = vendas.reduce((acc, v) => acc + v.total, 0);
        const patrimônio = produtos.reduce((acc, p) => acc + (p.preco * p.estoque), 0);
        const ticketMedio = vendas.length > 0 ? totalVendas / vendas.length : 0;
        return { totalVendas, patrimônio, ticketMedio, qtd: vendas.length };
    }, [vendas, produtos]);

    return (
      <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-3">📊 Dashboard Geral</h2>
        
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-indigo-600">
                <div className="text-xs text-gray-400 font-bold uppercase tracking-wider">Faturamento Total</div>
                <div className="text-2xl font-black text-indigo-700 mt-2">{currency(stats.totalVendas)}</div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-emerald-500">
                <div className="text-xs text-gray-400 font-bold uppercase tracking-wider">Vendas Realizadas</div>
                <div className="text-2xl font-black text-emerald-700 mt-2">{stats.qtd}</div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-dourado">
                <div className="text-xs text-gray-400 font-bold uppercase tracking-wider">Ticket Médio</div>
                <div className="text-2xl font-black text-yellow-700 mt-2">{currency(stats.ticketMedio)}</div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500 bg-purple-50/30">
                <div className="text-xs text-purple-600 font-bold uppercase tracking-wider">Patrimônio (Estoque)</div>
                <div className="text-2xl font-black text-purple-700 mt-2">{currency(stats.patrimônio)}</div>
            </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Grafico title="Vendas por Método" type="doughnut" data={dataPagamento} options={{ maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }} />
            <Grafico title="Evolução (Últimos 7 dias)" type="bar" data={dataVendasDia} options={{ maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }} />
        </div>

        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h3 className="font-bold mb-4 text-gray-700 text-base">Histórico Recente</h3>
            <div className="overflow-x-auto max-h-64 overflow-y-auto">
                <table className="w-full text-sm md:text-base">
                    <thead className="sticky top-0 bg-white shadow-sm"><tr className="text-gray-600 border-b"><th className="p-3 text-left">Data</th><th className="p-3 text-left">Pagamento</th><th className="p-3 text-right">Total Vendido</th></tr></thead>
                    <tbody className="divide-y">{vendas.slice().reverse().slice(0, 10).map(v => (
                        <tr key={v.id} className="hover:bg-gray-50">
                            <td className="p-3 text-gray-600 text-xs">{new Date(v.data).toLocaleString()}</td>
                            <td className="p-3 font-medium text-sm">{v.tipoPagamento}</td>
                            <td className="p-3 text-right font-bold text-green-600">{currency(v.total)}</td>
                        </tr>
                    ))}</tbody>
                </table>
            </div>
        </div>
      </div>
    );
  }

  function RelatorioAvancado({ vendas, produtos, users }) { 
    const [from, setFrom] = useState('');
    const [to, setTo] = useState('');
    const [filtroUsuario, setFiltroUsuario] = useState('');
    const { deleteDoc, doc } = window.firebaseMethods;
    const db = window.db;

    const vendasFiltradas = useMemo(() => {
      let filtered = vendas;
      if (from) filtered = filtered.filter(v => v.data.split('T')[0] >= from);
      if (to) filtered = filtered.filter(v => v.data.split('T')[0] <= to);
      if (filtroUsuario) filtered = filtered.filter(v => v.vendedor === filtroUsuario);
      return filtered;
    }, [vendas, from, to, filtroUsuario]);

    const vendasPorVendedor = useMemo(() => {
        const grupo = {};
        vendasFiltradas.forEach(v => { const vend = v.vendedor || 'Sistema'; if(!grupo[vend]) grupo[vend] = { total: 0, vendas: [] }; grupo[vend].vendas.push(v); grupo[vend].total += v.total; });
        return grupo;
    }, [vendasFiltradas]);

    const vendasPorMes = useMemo(() => {
        const grupo = {};
        vendasFiltradas.forEach(v => { const mes = v.data.substring(0, 7); grupo[mes] = (grupo[mes] || 0) + v.total; });
        return Object.entries(grupo).sort((a,b) => b[0].localeCompare(a[0]));
    }, [vendasFiltradas]);

    const totalGeralPeriodo = vendasFiltradas.reduce((acc, v) => acc + v.total, 0);

    async function limparDadosPorData(dataISO) {
        if (!confirm(`Apagar dados antigos?`)) return;
        const vendasParaApagar = vendas.filter(v => (v.data || '').split('T')[0] <= dataISO);
        for (const venda of vendasParaApagar) { await deleteDoc(doc(db, "vendas", venda.id)); }
        alert("Limpeza concluída.");
    }

    return (
      <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
        <h2 className="text-2xl font-bold text-gray-800 border-b pb-3">📈 Relatório Avançado</h2>
        
        <div className="bg-white border p-6 rounded-xl shadow-sm no-print flex flex-wrap gap-4 items-end">
            <label className="block w-full sm:w-auto"><span className="text-xs font-bold text-gray-500 uppercase block mb-1">De</span><input type="date" value={from} onChange={e=>setFrom(e.target.value)} className="w-full p-2 border rounded-lg h-10" /></label>
            <label className="block w-full sm:w-auto"><span className="text-xs font-bold text-gray-500 uppercase block mb-1">Até</span><input type="date" value={to} onChange={e=>setTo(e.target.value)} className="w-full p-2 border rounded-lg h-10" /></label>
            <label className="block w-full sm:w-auto min-w-[200px]"><span className="text-xs font-bold text-gray-500 uppercase block mb-1">Vendedor</span><select value={filtroUsuario} onChange={e => setFiltroUsuario(e.target.value)} className="w-full p-2 border rounded-lg bg-white h-10 text-sm"><option value="">Todos</option>{users.map(u => <option key={u.id} value={u.username}>{u.username}</option>)}</select></label>
            <div className="flex gap-3 ml-auto w-full sm:w-auto">
                <button onClick={()=>window.print()} className="flex-1 py-2 px-6 bg-gray-800 text-white font-bold rounded-lg text-sm">Imprimir</button>
                <button onClick={()=>limparDadosPorData(to)} disabled={!to} className="flex-1 py-2 px-6 bg-red-100 text-red-700 font-bold rounded-lg border border-red-200 text-sm">Limpar</button>
            </div>
        </div>

        <div id="relatorio-print-area" className="space-y-6">
            <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-dourado text-center md:text-left flex flex-col md:flex-row justify-between items-center">
                <div>
                    <h3 className="font-bold text-2xl text-gray-800 mb-2">Resumo do Período</h3>
                    <div className="text-sm text-gray-500">De {from || 'Início'} até {to || 'Hoje'}</div>
                </div>
                <div className="text-5xl font-black text-gray-800 mt-4 md:mt-0 bg-gray-50 px-6 py-3 rounded-xl border border-gray-100">{currency(totalGeralPeriodo)}</div>
            </div>
            
            {Object.keys(vendasPorVendedor).map(vendedor => (
                <div key={vendedor} className="mb-8 break-page bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div className="bg-gray-50 p-4 border-b border-gray-200 flex justify-between font-bold text-lg">
                        <span>👤 {vendedor}</span>
                        <span>{currency(vendasPorVendedor[vendedor].total)}</span>
                    </div>
                    <table className="w-full text-sm md:text-base print-table">
                        <thead className="bg-white text-gray-500"><tr><th className="p-3 text-left">Data</th><th className="p-3 text-left">Descrição</th><th className="p-3 text-right">Valor</th></tr></thead>
                        <tbody className="divide-y">{vendasPorVendedor[vendedor].vendas.map(v => (
                            <tr key={v.id}><td className="p-3">{new Date(v.data).toLocaleString()}</td><td className="p-3">{v.origem}</td><td className="p-3 text-right">{currency(v.total)}</td></tr>
                        ))}</tbody>
                    </table>
                </div>
            ))}
        </div>
      </div>
    );
  }

  /* ================= APP PRINCIPAL ================= */
  function App(){
    const [user, setUser] = useState(null);
    const [loading, setLoading] = useState(true);
    const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
    
    // Dados Globais
    const [produtos, setProdutos] = useState([]);
    const [vendas, setVendas] = useState([]);
    const [comandas, setComandas] = useState([]);
    const [fiados, setFiados] = useState([]);
    const [caixas, setCaixas] = useState([]);
    const [users, setUsers] = useState([]);
    const [avarias, setAvarias] = useState([]); 
    
    // Estado Local
    const [carrinho, setCarrinho] = useState([]);
    const [busca, setBusca] = useState('');
    const [selected, setSelected] = useState('pdv');

    const { collection, onSnapshot, addDoc, updateDoc, doc } = window.firebaseMethods;
    const db = window.db;

    const caixaAberto = useMemo(() => {
        if(!user) return null;
        return caixas.find(c => c.usuario === user.username && c.status === 'Aberto');
    }, [caixas, user]);

    useEffect(() => {
      const unsubProdutos = onSnapshot(collection(db, "produtos"), (snap) => setProdutos(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      const unsubVendas = onSnapshot(collection(db, "vendas"), (snap) => setVendas(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      const unsubComandas = onSnapshot(collection(db, "comandas"), (snap) => setComandas(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      const unsubFiados = onSnapshot(collection(db, "fiados"), (snap) => setFiados(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      const unsubCaixas = onSnapshot(collection(db, "caixas"), (snap) => setCaixas(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      const unsubUsers = onSnapshot(collection(db, "users"), (snap) => {
          const fetchedUsers = snap.docs.map(d => ({ ...d.data(), id: d.id }));
          setUsers(fetchedUsers.length > 0 ? fetchedUsers : [{ id: 'temp_admin', username: 'admin', password: '123', role: 'admin' }]);
      });
      const unsubAvarias = onSnapshot(collection(db, "avarias"), (snap) => setAvarias(snap.docs.map(d => ({ ...d.data(), id: d.id }))));
      setLoading(false);
      return () => { unsubProdutos(); unsubVendas(); unsubComandas(); unsubFiados(); unsubCaixas(); unsubUsers(); unsubAvarias(); };
    }, []);

    async function abrirCaixa(valorInicial) {
        if(caixaAberto) return alert("Você já tem um caixa aberto!");
        await addDoc(collection(db, "caixas"), { usuario: user.username, dataAbertura: new Date().toISOString(), saldoInicial: valorInicial, status: 'Aberto' });
        setSelected('pdv');
    }
    async function fecharCaixa(valorFinalDeclarado) {
        if(!caixaAberto) return;
        const vendasDoTurno = vendas.filter(v => v.data >= caixaAberto.dataAbertura && (!v.caixaId || v.caixaId === caixaAberto.id));
        const totalDinheiroVendido = vendasDoTurno.filter(v => v.tipoPagamento !== 'Fiado').reduce((acc, v) => acc + v.total, 0);
        await updateDoc(doc(db, "caixas", caixaAberto.id), { status: 'Fechado', dataFechamento: new Date().toISOString(), saldoFinalDeclarado: valorFinalDeclarado, totalVendido: totalDinheiroVendido });
        setSelected('caixa'); 
    }

    function adicionarAoCarrinho(produto){ 
      const itemExistente = carrinho.find(i=>i.id===produto.id);
      if (produto.estoque <= (itemExistente?.quantidade || 0)) return alert(`Estoque insuficiente!`);
      if(itemExistente) setCarrinho(carrinho.map(i => i.id===produto.id ? {...i, quantidade: i.quantidade+1} : i));
      else setCarrinho([...carrinho, {...produto, quantidade:1}]);
    }
    function alterarQuantidade(id, qtd){ 
      const prod = produtos.find(p=>p.id===id);
      if(qtd <= 0) setCarrinho(carrinho.filter(i=>i.id!==id));
      else if (qtd > prod.estoque) alert(`Máximo: ${prod.estoque}`);
      else setCarrinho(carrinho.map(i=> i.id===id ? {...i, quantidade:qtd} : i));
    }

    async function finalizarVenda(metodoSelecionado){
      if(!caixaAberto) return alert("Abra o caixa.");
      const total = carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0);
      const vendaData = new Date().toISOString();
      await addDoc(collection(db, "vendas"), { data: vendaData, itens: carrinho, total: total, origem: `PDV Balcão - ${metodoSelecionado}`, caixaId: caixaAberto.id, tipoPagamento: metodoSelecionado, vendedor: user.username });
      carrinho.forEach(async (item) => { await updateDoc(doc(db, "produtos", item.id), { estoque: item.estoque - item.quantidade }); });
      setCarrinho([]); alert(`Venda finalizada!`);
    }

    async function finalizarFiado(clienteId){
        if(!caixaAberto) return alert("Abra o caixa.");
        let cliente = fiados.find(f => f.id == clienteId);
        const total = carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0);
        const vendaData = new Date().toISOString();
        await updateDoc(doc(db, "fiados", cliente.id), {
            saldoDevedor: cliente.saldoDevedor + total,
            historico: [...cliente.historico, { data: vendaData, tipo: 'COMPRA', valor: total, itens: carrinho.map(i=>`${i.quantidade}x ${i.nome}`).join(', ') }]
        });
        await addDoc(collection(db, "vendas"), { data: vendaData, itens: carrinho, total: total, origem: `Fiado - ${cliente.nome}`, caixaId: caixaAberto.id, tipoPagamento: 'Fiado', vendedor: user.username });
        carrinho.forEach(async (item) => { await updateDoc(doc(db, "produtos", item.id), { estoque: item.estoque - item.quantidade }); });
        setCarrinho([]); alert(`Fiado registrado!`);
    }
    
    async function abrirComanda(){
      if(!caixaAberto) return alert("Abra o caixa!");
      const nomeCliente = prompt("Nome do cliente:"); if (!nomeCliente) return;
      carrinho.forEach(async (item) => { await updateDoc(doc(db, "produtos", item.id), { estoque: item.estoque - item.quantidade }); });
      await addDoc(collection(db, "comandas"), { 
          dataAbertura: new Date().toISOString(), 
          nomeCliente: nomeCliente, 
          mesaFixa: `MESA ${comandas.length + 1}`, 
          valorInicial: carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0), 
          status: 'Aberta', 
          itensPrePagos: carrinho.map(i => ({...i, quantidadeTotal: i.quantidade, quantidadeDisponivel: i.quantidade}))
      });
      setCarrinho([]); setSelected('comandas');
    }
    
    async function consumirItemPrePago(comandaId, itemId, qtd) {
        const comanda = comandas.find(c => c.id === comandaId);
        const novosItens = comanda.itensPrePagos.map(i => i.id === itemId ? {...i, quantidadeDisponivel: i.quantidadeDisponivel - qtd} : i);
        await updateDoc(doc(db, "comandas", comandaId), { itensPrePagos: novosItens });
    }
    
    async function fecharComandaEGerarVenda(comanda) {
      if(!caixaAberto) return;
      if (!confirm(`Confirmar recebimento?`)) return;
      const vendaData = new Date().toISOString();
      await addDoc(collection(db, "vendas"), { data: vendaData, itens: comanda.itensPrePagos, total: comanda.valorInicial, origem: `Comanda ${comanda.nomeCliente}`, caixaId: caixaAberto.id, tipoPagamento: 'Dinheiro', vendedor: user.username });
      await updateDoc(doc(db, "comandas", comanda.id), { status: 'Fechada', dataFechamento: vendaData });
      alert("Fechada!");
    }

    async function adicionarItemComanda(comandaId, produto) {
    const comanda = comandas.find(c => c.id === comandaId);
    const itemExistente = comanda.itensPrePagos.find(i => i.id === produto.id);
    
    let novosItens;
    if (itemExistente) {
        novosItens = comanda.itensPrePagos.map(i => 
        i.id === produto.id 
            ? { ...i, quantidadeTotal: i.quantidadeTotal + 1, quantidadeDisponivel: i.quantidadeDisponivel + 1 } 
            : i
        );
    } else {
        novosItens = [...comanda.itensPrePagos, { 
        ...produto, 
        quantidadeTotal: 1, 
        quantidadeDisponivel: 1 
        }];
    }

    await updateDoc(doc(db, "comandas", comandaId), { 
        itensPrePagos: novosItens,
        valorInicial: comanda.valorInicial + produto.preco
    });
    
    await updateDoc(doc(db, "produtos", produto.id), { 
        estoque: produto.estoque - 1 
    });
    }

    async function registrarAvaria(produtoId, qtd, motivo) {
        const produto = produtos.find(p => p.id === produtoId);
        await updateDoc(doc(db, "produtos", produtoId), { estoque: produto.estoque - qtd });
        await addDoc(collection(db, "avarias"), {
            data: new Date().toISOString(),
            produtoId: produto.id, produtoNome: produto.nome,
            categoria: produto.categoria, qtd: qtd, motivo: motivo,
            valorPerdido: produto.preco * qtd, usuario: user.username
        });
        alert('Registrado!');
    }

    const totalCarrinho = carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0);
    
    if(loading) return <div className="min-h-screen flex items-center justify-center text-dourado text-3xl font-bold animate-pulse">Carregando...</div>;
    if(!user) return <Login onLogin={setUser} users={users} />;

    return (
      <div className="flex flex-col h-full bg-slate-50 font-sans w-full overflow-hidden">
        <Header user={user} onLogout={()=>setUser(null)} caixaAberto={caixaAberto} onToggleMenu={()=>setMobileMenuOpen(true)} />
        <div className="flex flex-1 w-full overflow-hidden relative">
          <Sidebar selected={selected} setSelected={setSelected} user={user} mobileOpen={mobileMenuOpen} setMobileOpen={setMobileMenuOpen} />
          <main className="flex-1 p-4 md:p-6 overflow-y-auto w-full">
            {selected === 'pdv' && (
              <PDVView produtos={produtos} adicionarAoCarrinho={adicionarAoCarrinho} busca={busca} setBusca={setBusca}
                    carrinho={carrinho} alterarQuantidade={alterarQuantidade}
                    finalizarVenda={finalizarVenda} finalizarFiado={finalizarFiado}
                    totalCarrinho={totalCarrinho} abrirComanda={abrirComanda} caixaAberto={caixaAberto} 
                    fiados={fiados} setSelected={setSelected} />
            )}
            {selected === 'caixa' && <CaixaView caixaAberto={caixaAberto} abrirCaixa={abrirCaixa} fecharCaixa={fecharCaixa} vendasDoTurno={vendas.filter(v => v.caixaId === caixaAberto?.id)} user={user} />}
            {selected === 'usuarios' && user.role === 'admin' && <UsuariosView users={users} currentUser={user} />}
            {selected === 'fiado' && <FiadoView fiados={fiados} caixaAberto={caixaAberto} vendas={vendas} />}
            {selected === 'comandas' && <ComandasView comandas={comandas}  produtos={produtos} adicionarItemComanda={adicionarItemComanda} fecharComandaEGerarVenda={fecharComandaEGerarVenda} consumirItemPrePago={consumirItemPrePago} caixaAberto={caixaAberto} />}
            {selected === 'intelligence' && <IntelligenceView produtos={produtos} vendas={vendas} user={user} />}
            {selected === 'produtos' && <ProdutosView produtos={produtos} user={user} />}
            {selected === 'relatorios' && <RelatoriosView vendas={vendas} produtos={produtos} user={user} />}
            {selected === 'avancado' && user.role === 'admin' && <RelatorioAvancado vendas={vendas} produtos={produtos} users={users} />}
            {selected === 'avarias' && <AvariasView produtos={produtos} avarias={avarias} registrarAvaria={registrarAvaria} user={user} />}
          </main>
        </div>
      </div>
    );
  }

  ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
