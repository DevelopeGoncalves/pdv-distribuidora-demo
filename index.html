  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <script>
    // Prefixo para não misturar com outros dados do seu site
    const STORAGE_PREFIX = 'pdv_demo_';
    
    // Gera IDs aleatórios parecidos com os do Firebase
    const generateId = () => Math.random().toString(36).substring(2, 15);

    // Funções auxiliares para ler e salvar no LocalStorage
    const getCollectionData = (colName) => {
        const data = localStorage.getItem(STORAGE_PREFIX + colName);
        return data ? JSON.parse(data) : [];
    };

    const saveCollectionData = (colName, data) => {
        localStorage.setItem(STORAGE_PREFIX + colName, JSON.stringify(data));
        triggerListeners(colName);
    };

    // Sistema de reatividade falso para simular o onSnapshot do Firebase
    const listeners = {};
    const triggerListeners = (colName) => {
        if (listeners[colName]) {
            const data = getCollectionData(colName);
            const snapshot = {
                docs: data.map(item => ({ data: () => item, id: item.id }))
            };
            listeners[colName].forEach(cb => cb(snapshot));
        }
    };

    // Preenche com dados iniciais de demonstração se estiver vazio
    const setupInitialDemoData = () => {
        if (!localStorage.getItem(STORAGE_PREFIX + 'users')) {
            saveCollectionData('users', [{ id: generateId(), username: 'admin', password: '123', role: 'admin' }]);
            saveCollectionData('produtos', [
                { id: generateId(), nome: 'Coca Cola Lata 350ml', preco: 6.00, estoque: 50, categoria: 'Bebidas' },
                { id: generateId(), nome: 'Água Mineral sem Gás', preco: 3.00, estoque: 30, categoria: 'Bebidas' },
                { id: generateId(), nome: 'Coxinha de Frango', preco: 7.50, estoque: 15, categoria: 'Comida' },
                { id: generateId(), nome: 'Pastel de Carne', preco: 8.00, estoque: 20, categoria: 'Comida' },
                { id: generateId(), nome: 'Halls Morango', preco: 2.50, estoque: 100, categoria: 'Diversos' }
            ]);
            saveCollectionData('fiados', [
                { id: generateId(), nome: 'Cliente Teste (Demonstração)', saldoDevedor: 0, historico: [] }
            ]);
        }
    };
    setupInitialDemoData();

    // Cria os objetos globais que seu React espera encontrar
    window.db = "localDB";
    window.firebaseMethods = {
        collection: (db, name) => name,
        doc: (db, colName, id) => ({ collection: colName, id }),
        addDoc: async (colName, data) => {
            const colData = getCollectionData(colName);
            const newItem = { ...data, id: generateId() };
            colData.push(newItem);
            saveCollectionData(colName, colData);
            return { id: newItem.id };
        },
        updateDoc: async (docRef, data) => {
            const colData = getCollectionData(docRef.collection);
            const index = colData.findIndex(i => i.id === docRef.id);
            if (index !== -1) {
                colData[index] = { ...colData[index], ...data };
                saveCollectionData(docRef.collection, colData);
            }
        },
        deleteDoc: async (docRef) => {
            let colData = getCollectionData(docRef.collection);
            colData = colData.filter(i => i.id !== docRef.id);
            saveCollectionData(docRef.collection, colData);
        },
        onSnapshot: (colName, callback) => {
            if (!listeners[colName]) listeners[colName] = [];
            listeners[colName].push(callback);
            
            // Dispara imediatamente (comportamento padrão do Firebase)
            const data = getCollectionData(colName);
            const snapshot = { docs: data.map(item => ({ data: () => item, id: item.id })) };
            callback(snapshot);

            // Retorna função para cancelar inscrição
            return () => {
                listeners[colName] = listeners[colName].filter(cb => cb !== callback);
            };
        },
        getDocs: async (colName) => {
             const data = getCollectionData(colName);
             return { docs: data.map(item => ({ data: () => item, id: item.id })) };
        }
    };
  </script>

<body class="bg-gray-100 h-screen overflow-hidden text-gray-800">

  <div id="root" class="h-full"></div>

  <script type="text/babel">
  const { useState, useEffect, useMemo, useRef } = React;

  /* ================= UTILS & CONFIG ================= */
  const CATEGORIAS_PADRAO = ["Bebidas", "Comida", "Cigarros", "Diversos", "Outros"];

  function uid(){ return Date.now() + Math.floor(Math.random()*9999); }
  
  function currency(v){ 
    return Number(v||0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  /* ================= TELA DE LOGIN ATUALIZADA ================= */
  function Login({ onLogin, users }){
    const [u, setU] = useState('');
    const [p, setP] = useState('');
    const [err, setErr] = useState('');

    // Atualizado para a versão demo
    function limparCache() {
      if(confirm("Isso irá resetar os dados desta demonstração para o estado inicial. Continuar?")) {
        // Limpa apenas as chaves da nossa demo
        Object.keys(localStorage).forEach(key => {
            if(key.startsWith('pdv_demo_')) localStorage.removeItem(key);
        });
        alert("Ambiente restaurado! A página será recarregada.");
        window.location.reload();
      }
    }

    function submit(e){
      e.preventDefault();
      const foundUser = users.find(user => user.username.toLowerCase() === u.trim().toLowerCase() && user.password === p);
      if(foundUser){
        onLogin(foundUser);
      } else {
        setErr('Credenciais inválidas. Para demo, use admin / 123');
      }
    }

    return (
      <div className="min-h-screen flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center relative px-4">
        <div className="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div className="relative w-full max-w-3xl h-auto md:h-[450px] bg-black/40 border border-white/10 backdrop-blur-md rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row animate-fade-in">
            <div className="w-full md:w-5/12 p-8 flex flex-col justify-center items-center text-center bg-gradient-to-br from-black/60 to-transparent border-r border-white/5">
                <div className="mb-4 p-4 rounded-full border-2 border-dourado shadow-[0_0_15px_rgba(212,175,55,0.3)] bg-black">
                    <img src="img/victorino.png" alt="Victorino" className="w-16 h-16 object-contain rounded-full" onError={(e)=>{e.target.style.display='none'}} />
                </div>
                <h1 className="text-3xl font-extrabold text-white tracking-wide">VICTORINO<span className="text-dourado">.ENG</span></h1>
                <p className="text-gray-300 mt-2 text-sm font-light">Versão de Demonstração (Local)</p>
            </div>
            <div className="w-full md:w-7/12 p-8 bg-white/5 flex flex-col justify-center">
                <h2 className="text-2xl font-bold text-white mb-1">Bem-vindo à Demo</h2>
                <p className="text-gray-400 text-sm mb-6">Utilize <b>admin</b> e <b>123</b> para testar.</p>
                <form onSubmit={submit} className="space-y-4">
                    <input className="block w-full px-4 py-3 border border-white/20 rounded-lg bg-black/50 text-white placeholder-gray-500 focus:outline-none focus:border-dourado transition duration-200 text-base" 
                           value={u} onChange={e=>setU(e.target.value)} placeholder="Usuário (admin)" required />
                    <input type="password" className="block w-full px-4 py-3 border border-white/20 rounded-lg bg-black/50 text-white placeholder-gray-500 focus:outline-none focus:border-dourado transition duration-200 text-base" 
                           value={p} onChange={e=>setP(e.target.value)} placeholder="Senha (123)" required />
                    
                    {err && <div className="text-red-400 text-sm bg-red-900/20 p-2 rounded border border-red-500/30 text-center">{err}</div>}
                    
                    <button className="w-full py-3 px-4 text-base font-bold rounded-lg text-black bg-gradient-to-r from-dourado to-douradoEscuro hover:shadow-lg transition duration-300">
                        ACESSAR SISTEMA
                    </button>

                    <button type="button" onClick={limparCache} className="w-full text-gray-400 text-xs hover:text-white transition flex items-center justify-center gap-2 mt-2">
                        <span>🔄 Resetar Dados da Demo</span>
                    </button>
                </form>
            </div>
        </div>
      </div>
    );
  }

  /* ================= HEADER & SIDEBAR ================= */
  function Header({user, onLogout, caixaAberto, onToggleMenu}){
    return (
      <header className="bg-white shadow-sm sticky top-0 z-30 h-16 flex-none border-b border-gray-200 w-full">
        <div className="w-full px-4 md:px-6 h-full flex items-center justify-between">
          <div className="flex items-center gap-4">
            <button onClick={onToggleMenu} className="md:hidden text-gray-600 hover:text-black focus:outline-none">
                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>

            <div className="w-10 h-10 rounded-full bg-black border border-dourado flex items-center justify-center shadow-sm overflow-hidden">
                <img src="img/victorino.png" alt="Logo" className="w-full h-full object-cover" onError={(e)=>{e.target.style.display='none'}} />
            </div>
            <div>
              <div className="text-lg font-extrabold text-gray-800 leading-tight">Victorino<span className="text-dourado">.eng</span></div>
              <div className="text-xs text-gray-500 flex items-center gap-1">
                <span className="w-2 h-2 rounded-full bg-green-500"></span>
                Logado: <span className="font-bold text-black uppercase">{user?.username}</span> 
                {user?.role === 'admin' && <span className="ml-1 bg-black text-dourado px-1.5 py-0.5 rounded text-[10px] font-bold">ADMIN</span>}
              </div>
            </div>
          </div>
          <div className="flex items-center gap-4">
            {caixaAberto ? (
                <div className="hidden sm:flex px-4 py-1.5 bg-green-50 text-green-700 rounded-md text-sm font-bold border border-green-200 flex-col items-end shadow-sm">
                    <span className="flex items-center gap-1"><span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> CAIXA ABERTO</span>
                    <span className="text-[10px] text-gray-500">Op: {caixaAberto.usuario}</span>
                </div>
            ) : (
                <div className="hidden sm:block px-4 py-1.5 bg-red-50 text-red-700 rounded-md text-sm font-bold border border-red-200 shadow-sm">
                    🔒 CAIXA FECHADO
                </div>
            )}
            <div className="h-8 w-px bg-gray-300 mx-1 hidden sm:block"></div>
            <button onClick={onLogout} className="text-gray-500 hover:text-red-600 transition font-bold text-sm flex items-center gap-1">
                SAIR
                <svg className="w-4 h-4 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
          </div>
        </div>
      </header>
    );
  }

  function Sidebar({selected, setSelected, user, mobileOpen, setMobileOpen}){
    const itens = [
      { key:'caixa', label:'💰 Fluxo de Caixa', roles: ['admin', 'funcionario'] },
      { key:'pdv', label:'🛒 PDV (Venda)', roles: ['admin', 'funcionario'] },
      { key:'avarias', label:'🗑️ Avarias & Perdas', roles: ['admin', 'funcionario'] },
      { key:'intelligence', label:'📈 Inteligência & Estoque', roles: ['admin'] },
      { key:'fiado', label:'📒 Caderno de Fiado', roles: ['admin', 'funcionario'] },
      { key:'comandas', label:'💳 Comandas / Mesas', roles: ['admin', 'funcionario'] },
      { key:'produtos', label:'📦 Gerenciar Estoque', roles: ['admin', 'funcionario'] }, 
      { key:'relatorios', label:'📊 Dashboard & Gráficos', roles: ['admin'] },
      { key:'avancado', label:'📑 Relatório Avançado', roles: ['admin'] }, 
      { key:'usuarios', label:'👥 Usuários (Admin)', roles: ['admin'] }
    ];

    const menuPermitido = itens.filter(i => i.roles.includes(user.role));

    const baseClasses = "bg-white border-r border-gray-200 flex flex-col h-full shadow-sm transition-transform duration-300";
    const mobileClasses = `fixed inset-y-0 left-0 z-40 w-72 transform ${mobileOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 md:static md:w-64 lg:w-72`;

    return (
      <>
        {mobileOpen && <div className="fixed inset-0 bg-black/50 z-30 md:hidden" onClick={()=>setMobileOpen(false)}></div>}
        
        <aside className={`${baseClasses} ${mobileClasses}`}>
          <div className="p-4 flex justify-between items-center md:hidden border-b">
             <span className="font-bold text-lg">Menu</span>
             <button onClick={()=>setMobileOpen(false)} className="text-gray-500"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
          </div>

          <div className="p-4 flex-1 overflow-y-auto space-y-1.5">
            {menuPermitido.map(i=>(
              <button key={i.key} onClick={()=>{ setSelected(i.key); setMobileOpen(false); }}
                className={`flex items-center gap-3 w-full text-left px-4 py-3 rounded-lg text-base font-medium transition-all duration-200 ${selected===i.key ? 'bg-gradient-to-r from-gray-800 to-gray-700 text-dourado shadow-md transform scale-[1.01]' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900'}`}>
                <span>{i.label}</span>
              </button>
            ))}
          </div>
          
          <div className="p-4 border-t bg-gray-50/50">
              <a href="https://victorinoeng.com.br/" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 p-2 hover:bg-gray-100 rounded-lg transition duration-200 group cursor-pointer">
                  <div className="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center border border-indigo-200">
                    <span className="text-xl">💼</span>
                  </div>
                  <div className="flex flex-col">
                      <div className="font-bold text-sm text-gray-800 group-hover:text-indigo-600 transition leading-tight">Victorino.eng</div>
                      <div className="text-[10px] text-gray-500 font-bold uppercase tracking-wide">Visitar Site</div>
                  </div>
              </a>
          </div>
        </aside>
      </>
    );
  }

  /* ================= COMPONENTE: AVARIAS ================= */
  function AvariasView({ produtos, avarias, registrarAvaria, user }) {
      const [busca, setBusca] = useState('');
      const [prodSelecionado, setProdSelecionado] = useState(null);
      const [qtd, setQtd] = useState(1);
      const [motivo, setMotivo] = useState('Danificado / Quebrado');
      const [outroMotivo, setOutroMotivo] = useState('');

      const produtosFiltrados = produtos.filter(p => p.nome.toLowerCase().includes(busca.toLowerCase()));
      const totalPrejuizo = avarias.reduce((acc, item) => acc + item.valorPerdido, 0);

      function handleRegistrar(e) {
          e.preventDefault();
          if (!prodSelecionado) return alert("Selecione um produto.");
          if (qtd <= 0) return alert("Quantidade inválida.");
          
          const motivoFinal = motivo === 'Outros' ? outroMotivo : motivo;
          if(!motivoFinal) return alert("Informe o motivo.");

          if(confirm(`Confirmar baixa de ${qtd}x ${prodSelecionado.nome} como AVARIA?\nIsso será descontado do estoque.`)) {
              registrarAvaria(prodSelecionado.id, parseInt(qtd), motivoFinal);
              setProdSelecionado(null);
              setQtd(1);
              setBusca('');
              setMotivo('Danificado / Quebrado');
              setOutroMotivo('');
          }
      }

      return (
          <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
              <h2 className="text-2xl font-bold text-gray-800 border-b pb-3 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                  <span>🗑️ Gestão de Avarias & Perdas</span>
                  <div className="text-base bg-red-50 text-red-700 px-4 py-2 rounded-lg border border-red-200">
                      Prejuízo Acumulado: <span className="font-bold text-xl">{currency(totalPrejuizo)}</span>
                  </div>
              </h2>

              <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 xl:col-span-1 h-fit">
                      <h3 className="font-bold text-gray-700 mb-4 text-base uppercase border-b pb-2">Registrar Nova Perda</h3>
                      
                      <div className="mb-4 relative">
                          <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Buscar Produto</label>
                          <input 
                              value={busca} 
                              onChange={e => { setBusca(e.target.value); setProdSelecionado(null); }}
                              placeholder="Digite o nome..." 
                              className="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-red-500 text-base"
                          />
                          {busca && !prodSelecionado && (
                              <div className="absolute z-10 w-full bg-white border border-gray-200 mt-1 max-h-60 overflow-y-auto rounded-md shadow-lg">
                                  {produtosFiltrados.map(p => (
                                      <div key={p.id} onClick={() => { setProdSelecionado(p); setBusca(p.nome); }} className="p-3 hover:bg-gray-100 cursor-pointer text-sm flex justify-between border-b last:border-0">
                                          <span>{p.nome}</span>
                                          <span className="font-bold text-gray-500">Est: {p.estoque}</span>
                                      </div>
                                  ))}
                              </div>
                          )}
                      </div>

                      {prodSelecionado && (
                          <div className="bg-red-50 p-4 rounded-lg mb-4 border border-red-100 text-sm">
                              <div className="font-bold text-red-800 text-lg">{prodSelecionado.nome}</div>
                              <div className="text-gray-700 mt-1">Preço Venda: {currency(prodSelecionado.preco)}</div>
                              <div className="text-gray-700">Em Estoque: <strong>{prodSelecionado.estoque}</strong></div>
                          </div>
                      )}

                      <form onSubmit={handleRegistrar}>
                          <div className="grid grid-cols-2 gap-4 mb-4">
                              <div>
                                  <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Quantidade</label>
                                  <input type="number" min="1" value={qtd} onChange={e=>setQtd(e.target.value)} className="w-full p-3 border rounded-lg outline-none text-base" required />
                              </div>
                              <div>
                                  <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Motivo</label>
                                  <select value={motivo} onChange={e=>setMotivo(e.target.value)} className="w-full p-3 border rounded-lg outline-none text-base bg-white h-[50px]">
                                      <option>Danificado / Quebrado</option>
                                      <option>Vencido / Estragado</option>
                                      <option>Consumo Próprio</option>
                                      <option>Roubo / Furto</option>
                                      <option>Outros</option>
                                  </select>
                              </div>
                          </div>
                          
                          {motivo === 'Outros' && (
                              <div className="mb-4">
                                  <input value={outroMotivo} onChange={e=>setOutroMotivo(e.target.value)} placeholder="Descreva o motivo..." className="w-full p-3 border rounded-lg outline-none text-base" required />
                              </div>
                          )}

                          <button disabled={!prodSelecionado} className="w-full py-3 bg-red-600 text-white font-bold rounded-lg shadow hover:bg-red-700 transition disabled:opacity-50 text-base uppercase tracking-wide">
                              CONFIRMAR BAIXA
                          </button>
                      </form>
                  </div>

                  <div className="xl:col-span-2 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[600px]">

  /* ================= COMPONENTE: INTELIGÊNCIA ================= */
  function IntelligenceView({ produtos, vendas, user }) {
    if (user.role !== 'admin') return <div className="p-10 text-center font-bold text-red-500">Acesso Negado.</div>;
    const [filtro, setFiltro] = useState('');
    const [filtroStatus, setFiltroStatus] = useState('');

    const valorTotalEstoque = useMemo(() => {
    return produtos.reduce((acc, p) => acc + (p.preco * p.estoque), 0);
    }, [produtos]);

    const dadosGiro = useMemo(() => {
        const vendasMap = {};
        vendas.forEach(v => {
            if(v.itens){
                v.itens.forEach(item => {
                    vendasMap[item.id] = (vendasMap[item.id] || 0) + item.quantidade;
                });
            }
        });
        return produtos.map(p => {
            const qtdVendida = vendasMap[p.id] || 0;
            const faturamentoGerado = qtdVendida * p.preco;
            let status = 'Normal';
            let corStatus = 'bg-gray-100 text-gray-800 border-gray-200';
            if (qtdVendida > 20) { status = '🔥 GIRANDO MUITO'; corStatus = 'bg-green-100 text-green-800 border-green-300'; } 
            else if (qtdVendida > 5) { status = '✅ BOM GIRO'; corStatus = 'bg-blue-100 text-blue-800 border-blue-300'; } 
            else if (qtdVendida === 0 && p.estoque > 0) { status = '❄️ PARADO'; corStatus = 'bg-red-100 text-red-800 border-red-300'; } 
            else if (p.estoque === 0) { status = '⚠️ SEM ESTOQUE'; corStatus = 'bg-yellow-100 text-yellow-800 border-yellow-300'; }
            return { ...p, qtdVendida, faturamentoGerado, status, corStatus };
        });
    }, [produtos, vendas]);

    const dadosFiltrados = dadosGiro.filter(p => {
        const termo = filtro.toLowerCase();
        const matchTexto = p.nome.toLowerCase().includes(termo) || p.categoria.toLowerCase().includes(termo);
        const matchStatus = filtroStatus === '' || p.status === filtroStatus;
        return matchTexto && matchStatus;
    });

    const topVendas = [...dadosGiro].sort((a,b) => b.qtdVendida - a.qtdVendida).slice(0, 5);
    const parados = [...dadosGiro].filter(p => p.qtdVendida === 0 && p.estoque > 0).slice(0, 5);

    return (
        <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
            <h2 className="text-2xl font-bold text-gray-800 border-b pb-3">📈 Inteligência de Negócio</h2>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-t-4 border-t-green-500">
                    <h3 className="font-bold text-base text-green-800 mb-4 flex items-center gap-2"><span className="text-2xl">🏆</span> O que mais vende</h3>
                    <div className="space-y-3">
                        {topVendas.map((p, idx) => (
                            <div key={p.id} className="flex justify-between items-center border-b border-gray-100 pb-2 last:border-0 hover:bg-gray-50 p-2 rounded transition text-base">
                                <div className="flex items-center gap-3">
                                    <span className={`font-bold w-6 h-6 flex items-center justify-center rounded-full text-xs ${idx===0 ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-500'}`}>#{idx+1}</span>
                                    <div><div className="font-bold text-gray-800">{p.nome}</div></div>
                                </div>
                                <div className="text-right"><div className="font-bold text-green-600">{p.qtdVendida} un.</div></div>
                            </div>
                        ))}
                    </div>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-t-4 border-t-red-500">
                    <h3 className="font-bold text-base text-red-800 mb-4 flex items-center gap-2"><span className="text-2xl">🛑</span> Produtos Parados</h3>
                    <div className="space-y-3">
                        {parados.length === 0 ? <div className="text-gray-400 text-sm italic py-4 text-center">Tudo está vendendo!</div> : parados.map((p) => (
                            <div key={p.id} className="flex justify-between items-center border-b border-red-100 pb-2 last:border-0 bg-red-50 p-2 rounded text-base">
                                <div><div className="font-bold text-gray-700">{p.nome}</div></div>
                                <div className="text-right"><div className="font-bold text-gray-800">{p.estoque} un.</div></div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
            
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div className="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4">
                    <h3 className="font-bold text-lg text-gray-700">🔍 Análise Detalhada</h3>
                    <div className="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                        <select 
                            value={filtroStatus} 
                            onChange={e => setFiltroStatus(e.target.value)} 
                            className="p-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-dourado bg-gray-50 text-gray-700 text-base outline-none h-11"
                        >
                            <option value="">Todos os Status</option>
                            <option value="🔥 GIRANDO MUITO">🔥 Girando Muito</option>
                            <option value="✅ BOM GIRO">✅ Bom Giro</option>
                            <option value="Normal">Normal</option>
                            <option value="❄️ PARADO">❄️ Parado</option>
                            <option value="⚠️ SEM ESTOQUE">⚠️ Sem Estoque</option>
                        </select>
                        <input value={filtro} onChange={e => setFiltro(e.target.value)} placeholder="Pesquisar..." className="p-2 border border-gray-300 rounded-lg focus:ring-1 focus:ring-dourado min-w-[250px] outline-none text-base h-11" />
                    </div>
                </div>
                <div className="overflow-x-auto rounded-lg border border-gray-200">
                    <table className="w-full text-sm md:text-base">
                        <thead className="bg-gray-100 text-gray-600">
                            <tr><th className="p-3 text-left">Produto</th><th className="p-3 text-center">Status</th><th className="p-3 text-right">Estoque</th><th className="p-3 text-right">Vendido</th><th className="p-3 text-right">Preço Un.</th></tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                            {dadosFiltrados.length === 0 ? (
                                <tr><td colSpan="5" className="p-6 text-center text-gray-400">Nenhum produto encontrado.</td></tr>
                            ) : dadosFiltrados.map(p => (
                                <tr key={p.id} className="hover:bg-gray-50 transition">
                                    <td className="p-3 font-medium text-gray-800">{p.nome}</td>
                                    <td className="p-3 text-center"><span className={`px-3 py-1 rounded-full text-xs uppercase tracking-wide font-bold border ${p.corStatus}`}>{p.status}</span></td>
                                    <td className="p-3 text-right font-bold text-gray-700">{p.estoque}</td>
                                    <td className="p-3 text-right text-gray-600">{p.qtdVendida}</td>
                                    <td className="p-3 text-right font-medium">{currency(p.preco)}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    );
  }

  /* ================= COMPONENTE: USUARIOS ================= */
  function UsuariosView({ users, currentUser }) {
      const [novoUser, setNovoUser] = useState('');
      const [novaSenha, setNovaSenha] = useState('');
      const [novoRole, setNovoRole] = useState('funcionario');
      const { addDoc, collection, deleteDoc, doc } = window.firebaseMethods;
      const db = window.db;

      async function cadastrar(e){
          e.preventDefault();
          if(!novoUser || !novaSenha) return alert("Preencha todos os campos");
          if(users.some(u => u.username.toLowerCase() === novoUser.toLowerCase())) return alert("Usuário já existe!");
          await addDoc(collection(db, "users"), { username: novoUser.trim(), password: novaSenha, role: novoRole });
          setNovoUser(''); setNovaSenha(''); alert(`Usuário ${novoUser} cadastrado com sucesso!`);
      }
      async function remover(id){
          if(id === currentUser.id) return alert("Você não pode se excluir!");
          const userToDelete = users.find(u=>u.id===id);
          if(!confirm(`Tem certeza que deseja remover o acesso de ${userToDelete.username}?`)) return;
          if(users.filter(u=>u.role==='admin' && u.id !== id).length === 0) return alert("O sistema precisa de pelo menos 1 admin.");
          await deleteDoc(doc(db, "users", id));
      }
      return (
          <div className="space-y-6 animate-fade-in w-full max-w-[1200px] mx-auto">
              <h2 className="text-2xl font-bold text-gray-800 border-b pb-3">👥 Gestão de Usuários</h2>
              <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                  <h3 className="font-bold text-base mb-4 text-indigo-700">Cadastrar Novo Acesso</h3>
                  <form onSubmit={cadastrar} className="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                      <label className="block">
                          <span className="text-xs font-bold text-gray-500 uppercase">Usuário</span>
                          <input value={novoUser} onChange={e=>setNovoUser(e.target.value)} className="mt-1 w-full p-2 h-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base" placeholder="Ex: joao" required />
                      </label>
                      <label className="block">
                          <span className="text-xs font-bold text-gray-500 uppercase">Senha</span>
                          <input value={novaSenha} onChange={e=>setNovaSenha(e.target.value)} className="mt-1 w-full p-2 h-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base" placeholder="******" required />
                      </label>
                      <label className="block">
                          <span className="text-xs font-bold text-gray-500 uppercase">Permissão</span>
                          <select value={novoRole} onChange={e=>setNovoRole(e.target.value)} className="mt-1 w-full p-2 h-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white text-base">
                              <option value="funcionario">Vendedor (Básico)</option>
                              <option value="admin">Administrador (Total)</option>
                          </select>
                      </label>
                      <button className="h-10 px-6 bg-indigo-600 text-white rounded-lg font-bold shadow hover:bg-indigo-700 transition text-sm uppercase">Cadastrar</button>
                  </form>
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <table className="w-full text-base">
                      <thead className="bg-gray-50 text-gray-600 border-b"><tr><th className="p-4 text-left">Usuário</th><th className="p-4 text-left">Nível</th><th className="p-4 text-right">Ação</th></tr></thead>
                      <tbody className="divide-y">
                          {users.map(u => (
                              <tr key={u.id} className="hover:bg-gray-50">
                                  <td className="p-4 font-bold text-gray-800">{u.username} {u.id === currentUser.id && <span className="text-xs font-normal text-gray-500 ml-2">(Você)</span>}</td>
                                  <td className="p-4"><span className={`px-3 py-1 rounded text-xs font-bold ${u.role==='admin' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-700'}`}>{u.role.toUpperCase()}</span></td>
                                  <td className="p-4 text-right"><button onClick={()=>remover(u.id)} className="text-red-500 hover:text-red-700 font-bold text-xs uppercase hover:underline disabled:opacity-30" disabled={u.id===currentUser.id}>Remover</button></td>
                              </tr>
                          ))}
                      </tbody>
                  </table>
              </div>
          </div>
      );
  }

  /* ================= COMPONENTE: CAIXA ================= */
  function CaixaView({ caixaAberto, abrirCaixa, fecharCaixa, vendasDoTurno, user }) {
    const [valorInicial, setValorInicial] = useState('');
    const [valorFinal, setValorFinal] = useState('');

    const vendasDinheiro = vendasDoTurno.filter(v => v.tipoPagamento !== 'Fiado');
    const vendasFiado = vendasDoTurno.filter(v => v.tipoPagamento === 'Fiado');
    const totalDinheiroVendido = vendasDinheiro.reduce((acc, v) => acc + v.total, 0);
    const totalFiadoVendido = vendasFiado.reduce((acc, v) => acc + v.total, 0);
    const saldoEsperado = caixaAberto ? (caixaAberto.saldoInicial + totalDinheiroVendido) : 0;

    function handleAbrir(e) {
        e.preventDefault();
        if(!valorInicial) return alert("Informe o valor inicial");
        abrirCaixa(parseFloat(valorInicial)); setValorInicial('');
    }
    function handleFechar(e) {
        e.preventDefault();
        if(!confirm(`Confirma o fechamento do caixa?`)) return;
        fecharCaixa(parseFloat(valorFinal || 0)); setValorFinal('');
    }

    if (!caixaAberto) {
        return (
            <div className="max-w-lg mx-auto mt-12 animate-fade-in px-4">
                <div className="bg-white rounded-2xl shadow-xl border border-red-100 overflow-hidden">
                    <div className="bg-red-50 p-6 text-center border-b border-red-100">
                        <div className="text-5xl mb-3">🔒</div>
                        <h2 className="text-2xl font-bold text-red-800">Caixa Fechado</h2>
                        <p className="text-red-600 text-sm">Abra o caixa para começar.</p>
                    </div>
                    <form onSubmit={handleAbrir} className="p-8">
                        <label className="block text-xs font-bold text-gray-700 mb-2 uppercase tracking-wide">Fundo de Troco (R$)</label>
                        <input type="number" step="0.01" className="w-full p-4 border-2 border-gray-200 rounded-xl text-2xl font-bold text-gray-800 mb-6 focus:border-green-500 focus:ring-0 outline-none transition" value={valorInicial} onChange={e=>setValorInicial(e.target.value)} placeholder="0,00" autoFocus />
                        <button className="w-full py-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl shadow-lg transform hover:-translate-y-0.5 transition duration-200 text-lg">ABRIR MEU CAIXA</button>
                    </form>
                </div>
            </div>
        );
    }

    if (caixaAberto.usuario !== user.username) {
         return <div className="p-8 bg-yellow-50 border border-yellow-200 rounded-xl text-center m-4"><h2 className="text-2xl font-bold text-yellow-800">⚠️ Caixa Aberto por {caixaAberto.usuario}</h2></div>;
    }

    return (
        <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
            <h2 className="text-2xl font-bold text-gray-800 border-b pb-3 flex justify-between items-end">
                <span>💰 Fluxo de Caixa</span>
                <span className="text-xs bg-gray-100 px-3 py-1 rounded-full text-gray-500 font-medium border border-gray-200">Operador: <strong className="text-gray-800">{caixaAberto.usuario}</strong></span>
            </h2>
            
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <div className="text-gray-400 text-xs uppercase font-bold tracking-wider">Fundo Inicial</div>
                    <div className="text-2xl font-extrabold text-gray-800 mt-1">{currency(caixaAberto.saldoInicial)}</div>
                </div>
                <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-green-500">
                    <div className="text-gray-400 text-xs uppercase font-bold tracking-wider">Entradas (Dinheiro)</div>
                    <div className="text-2xl font-extrabold text-green-600 mt-1">{currency(totalDinheiroVendido)}</div>
                </div>
                <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-orange-400">
                    <div className="text-gray-400 text-xs uppercase font-bold tracking-wider">Vendas Fiado</div>
                    <div className="text-2xl font-extrabold text-orange-600 mt-1">{currency(totalFiadoVendido)}</div>
                </div>
                <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-purple-600 bg-purple-50">
                    <div className="text-purple-800 text-xs uppercase font-bold tracking-wider">Saldo em Gaveta</div>
                    <div className="text-3xl font-black text-purple-700 mt-1">{currency(saldoEsperado)}</div>
                </div>
            </div>

            <div className="flex flex-col xl:flex-row gap-6">
                <div className="flex-1">
                    <h3 className="font-bold text-base mb-3 text-gray-700">Movimentações do Turno</h3>
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden h-[400px] overflow-y-auto">
                        <table className="w-full text-sm md:text-base">
                            <thead className="bg-gray-50 text-gray-500 sticky top-0 border-b z-10"><tr><th className="p-3 text-left">Hora</th><th className="p-3 text-left">Descrição</th><th className="p-3 text-center">Tipo</th><th className="p-3 text-right">Valor</th></tr></thead>
                            <tbody className="divide-y">
                                {vendasDoTurno.length === 0 ? <tr><td colSpan="4" className="p-8 text-center text-gray-400 italic">Nenhuma venda neste turno.</td></tr> : vendasDoTurno.slice().reverse().map(v => (
                                    <tr key={v.id} className="hover:bg-gray-50">
                                        <td className="p-3 text-gray-500 text-xs">{new Date(v.data).toLocaleTimeString()}</td>
                                        <td className="p-3 font-medium text-gray-800">{v.origem}</td>
                                        <td className="p-3 text-center">
                                            {v.tipoPagamento === 'Fiado' ? <span className="text-[10px] bg-orange-100 text-orange-700 px-2 py-1 rounded font-bold">FIADO</span> : 
                                             v.tipoPagamento === 'Pix' ? <span className="text-[10px] bg-teal-100 text-teal-700 px-2 py-1 rounded font-bold">PIX</span> :
                                             v.tipoPagamento === 'Dinheiro' ? <span className="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded font-bold">DINHEIRO</span> :
                                             <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold">{v.tipoPagamento.toUpperCase()}</span>}
                                        </td>
                                        <td className="p-3 text-right font-bold text-gray-700">{currency(v.total)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div className="w-full xl:w-1/3">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-red-100 h-full">
                        <h3 className="font-bold text-base text-red-700 mb-4 flex items-center gap-2"><span className="w-2 h-2 bg-red-500 rounded-full"></span> Fechamento de Caixa</h3>
                        <p className="text-sm text-gray-500 mb-4">Ao fechar, o sistema zera o saldo para o próximo turno.</p>
                        <form onSubmit={handleFechar} className="flex flex-col gap-4">
                            <div>
                                <label className="block text-xs font-bold text-gray-500 mb-1 uppercase">Valor Contado na Gaveta</label>
                                <input type="number" step="0.01" className="w-full p-3 border-2 border-gray-200 rounded-lg text-2xl font-bold text-gray-800 outline-none focus:border-red-400 transition" value={valorFinal} onChange={e=>setValorFinal(e.target.value)} placeholder="0,00" required />
                            </div>
                            <button className="w-full py-3 px-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg shadow transition text-base">ENCERRAR TURNO</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    );
  }

  /* ================= COMPONENTE: FIADO ================= */
  function FiadoView({ fiados, caixaAberto, vendas }) {
      const [nomeNovo, setNomeNovo] = useState('');
      const [valorPagamento, setValorPagamento] = useState('');
      const [clienteSelecionado, setClienteSelecionado] = useState(null);
      const { addDoc, collection, updateDoc, doc } = window.firebaseMethods;
      const db = window.db;

      async function criarDevedor(e){
          e.preventDefault();
          if(!nomeNovo) return;
          await addDoc(collection(db, "fiados"), { nome: nomeNovo, saldoDevedor: 0, historico: [] });
          setNomeNovo('');
          alert('Cliente cadastrado.');
      }

      async function receberPagamento(e){
          e.preventDefault();
          if(!clienteSelecionado || !valorPagamento) return;
          const valor = parseFloat(valorPagamento);
          if(valor <= 0) return alert("Valor inválido");
          
          if(confirm(`Receber ${currency(valor)} de ${clienteSelecionado.nome}?`)){
              const clienteRef = doc(db, "fiados", clienteSelecionado.id);
              await updateDoc(clienteRef, {
                  saldoDevedor: clienteSelecionado.saldoDevedor - valor,
                  historico: [...clienteSelecionado.historico, { data: new Date().toISOString(), tipo: 'PAGAMENTO', valor: valor }]
              });

              if(caixaAberto){
                  if(confirm("Lançar entrada no CAIXA ABERTO?")){
                      await addDoc(collection(db, "vendas"), {
                          data: new Date().toISOString(),
                          itens: [], total: valor,
                          origem: `Receb. Fiado - ${clienteSelecionado.nome}`,
                          caixaId: caixaAberto.id,
                          tipoPagamento: 'Dinheiro',
                          vendedor: caixaAberto.usuario
                      });
                  }
              }
              setValorPagamento('');
              setClienteSelecionado(null);
          }
      }

      const restantePreview = clienteSelecionado ? clienteSelecionado.saldoDevedor - (parseFloat(valorPagamento) || 0) : 0;

      return (
          <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
               <h2 className="text-2xl font-bold text-gray-800 border-b pb-3">📒 Caderno de Fiado</h2>
               
               <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row gap-4 items-end">
                   <div className="flex-1 w-full">
                       <label className="text-xs font-bold text-gray-500 uppercase">Adicionar Novo Cliente</label>
                       <input value={nomeNovo} onChange={e=>setNomeNovo(e.target.value)} className="w-full p-2 h-11 border rounded-lg mt-1 focus:ring-2 focus:ring-indigo-500 outline-none text-base" placeholder="Nome do Cliente..." />
                   </div>
                   <button onClick={criarDevedor} className="w-full md:w-auto px-6 h-11 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition text-sm uppercase">Cadastrar</button>
               </div>

               <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                   <div className="xl:col-span-2 space-y-3">
                       {fiados.map(f => (
                           <div key={f.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:border-orange-200 transition flex justify-between items-center group">
                               <div>
                                   <div className="font-bold text-lg text-gray-800">{f.nome}</div>
                                   <div className="text-xs text-gray-400">{f.historico.length} movimentações registradas</div>
                               </div>
                               <div className="text-right">
                                   <div className="text-[10px] text-gray-500 uppercase font-bold">Dívida Atual</div>
                                   <div className="text-xl font-bold text-red-600">{currency(f.saldoDevedor)}</div>
                                   {f.saldoDevedor > 0 && <button onClick={()=>setClienteSelecionado(f)} className="mt-2 text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-bold hover:bg-green-200 transition">Receber Pagamento</button>}
                               </div>
                           </div>
                       ))}
                       {fiados.length === 0 && <div className="text-gray-400 text-center py-12 bg-gray-50 rounded-xl border border-dashed border-gray-300">Nenhum cliente cadastrado no fiado.</div>}
                   </div>

                   <div className="h-fit sticky top-20">
                       {clienteSelecionado ? (
                           <div className="bg-white p-6 rounded-2xl shadow-lg border border-orange-100 animate-slide-left">
                               <h3 className="font-bold text-lg text-gray-800 mb-4 border-b pb-2">Baixar Conta</h3>
                               <div className="mb-4 bg-orange-50 p-4 rounded-xl border border-orange-100">
                                   <div className="text-xs text-gray-500 uppercase font-bold">Cliente Selecionado</div>
                                   <div className="font-extrabold text-xl text-gray-800">{clienteSelecionado.nome}</div>
                                   <div className="flex justify-between items-end mt-2">
                                       <span className="text-sm">Total Devido:</span>
                                       <span className="font-bold text-red-600 text-lg">{currency(clienteSelecionado.saldoDevedor)}</span>
                                   </div>
                               </div>
                               
                               <form onSubmit={receberPagamento}>
                                   <label className="block mb-1 text-xs font-bold text-gray-500 uppercase">Valor do Pagamento</label>
                                   <input type="number" step="0.01" value={valorPagamento} onChange={e=>setValorPagamento(e.target.value)} className="w-full p-3 border-2 border-indigo-100 rounded-lg mb-4 text-2xl font-bold text-gray-800 text-right focus:border-indigo-500 outline-none transition" placeholder="0,00" autoFocus />
                                   
                                   <div className="mb-6 p-3 bg-gray-50 rounded-lg flex justify-between items-center border border-gray-100">
                                        <span className="text-xs text-gray-500 font-bold uppercase">Restante</span>
                                        <span className={`font-bold text-base ${restantePreview < 0 ? 'text-green-600' : 'text-gray-800'}`}>
                                            {currency(restantePreview)} {restantePreview < 0 && '(Troco)'}
                                        </span>
                                   </div>

                                   <div className="flex gap-3">
                                       <button type="button" onClick={()=>{setClienteSelecionado(null); setValorPagamento('');}} className="flex-1 py-3 border border-gray-300 rounded-lg text-gray-600 font-bold hover:bg-gray-50 text-sm">Cancelar</button>
                                       <button type="submit" className="flex-1 py-3 bg-green-600 text-white rounded-lg font-bold shadow-md hover:bg-green-700 hover:shadow-lg transition text-sm">Confirmar</button>
                                   </div>
                               </form>
                           </div>
                       ) : (
                           <div className="bg-gray-50 p-8 rounded-2xl border border-gray-200 text-center text-gray-400 hidden xl:block">
                               <div className="text-4xl mb-3">👈</div>
                               <span className="text-sm">Selecione um cliente para registrar pagamento.</span>
                           </div>
                       )}
                   </div>
               </div>
          </div>
      );
  }

  /* ================= COMPONENTE: PDV (VENDAS) ================= */
  function PDVView({produtos, adicionarAoCarrinho, busca, setBusca, carrinho, alterarQuantidade, removerDoCarrinho, finalizarVenda, totalCarrinho, abrirComanda, caixaAberto, finalizarFiado, fiados, setSelected}){
    const produtosFiltrados = produtos.filter(p => p.nome.toLowerCase().includes(busca.toLowerCase()) || p.categoria.toLowerCase().includes(busca.toLowerCase()));
    
    const [modalFiadoOpen, setModalFiadoOpen] = useState(false);
    const [modalPagamentoOpen, setModalPagamentoOpen] = useState(false);
    const [selectedClienteId, setSelectedClienteId] = useState('');

    function handleClickFiado() {
        if (!caixaAberto) return alert("Erro: Abra o caixa para vender.");
        if (carrinho.length === 0) return alert('Carrinho vazio!');
        if (fiados.length === 0) {
            if(confirm("Você não tem clientes cadastrados no FIADO.\nDeseja ir para a aba de cadastro agora?")) {
                setSelected('fiado');
            }
            return;
        }
        setModalFiadoOpen(true);
        setSelectedClienteId('');
    }

    function handleClickPagar() {
        if (!caixaAberto) return alert("Erro: Abra o caixa para vender.");
        if (carrinho.length === 0) return alert('Carrinho vazio!');
        setModalPagamentoOpen(true);
    }

    function confirmarSelecaoFiado() {
        if(!selectedClienteId) return alert("Selecione um cliente da lista!");
        finalizarFiado(selectedClienteId);
        setModalFiadoOpen(false);
    }

    function confirmarPagamento(metodo) {
        finalizarVenda(metodo);
        setModalPagamentoOpen(false);
    }

    return (
      <div className="space-y-4 relative h-full flex flex-col w-full">
        {!caixaAberto && <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-2 shadow-sm animate-pulse text-base font-bold">Atenção! O caixa está fechado. Abra-o para vender.</div>}

        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex gap-3 items-center">
          <svg className="w-6 h-6 text-gray-400 flex-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Pesquisar produto ou categoria..." className="flex-1 p-2 text-lg outline-none text-gray-700 placeholder-gray-400 w-full" autoFocus />
        </div>

        <div className="flex flex-col xl:flex-row gap-6 flex-1 min-h-0 overflow-hidden">
          
          <div className="flex-1 overflow-y-auto pr-1">
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-4 2xl:grid-cols-5 gap-3 pb-6">
              {produtosFiltrados.map(produto => (
                <div key={produto.id} onClick={()=>adicionarAoCarrinho(produto)} className="bg-white p-3 md:p-4 rounded-xl border border-gray-200 cursor-pointer shadow-sm hover:shadow-md hover:border-dourado transform active:scale-95 transition-all group flex flex-col justify-between min-h-[150px]">
                  <div>
                      <div className="text-[9px] md:text-[10px] font-bold text-gray-400 uppercase mb-1 truncate">{produto.categoria}</div>
                      <div className="font-bold text-gray-800 text-sm md:text-base leading-tight group-hover:text-douradoEscuro transition mb-2 line-clamp-2 h-10 md:h-12">{produto.nome}</div>
                  </div>
                  <div className="flex flex-wrap justify-between items-end gap-1">
                        <div className="text-green-700 font-black text-lg md:text-xl whitespace-nowrap">{currency(produto.preco)}</div>
                        <div className={`text-[9px] md:text-[10px] font-bold px-2 py-0.5 rounded-full ${produto.estoque <= 10 ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-600'}`}>
                            {produto.estoque} un.
                        </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="w-full xl:w-[400px] flex-none flex flex-col h-auto xl:h-full bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
             <div className="bg-gray-800 text-white p-4 flex justify-between items-center flex-none">
                <h3 className="font-bold text-base md:text-lg flex items-center gap-2">🛒 Cesta de Compras</h3>
                <span className="text-xs bg-gray-700 px-3 py-1 rounded font-bold">{carrinho.length} itens</span>
             </div>
                
             <div className="flex-1 overflow-y-auto p-3 md:p-4 space-y-3 bg-gray-50 max-h-[250px] md:max-h-[350px] xl:max-h-none">
                {carrinho.map(item=>(
                    <div key={item.id} className="bg-white p-3 rounded-lg border border-gray-200 shadow-sm flex flex-col gap-1">
                        <div className="flex justify-between items-start text-sm md:text-base">
                            <div className="font-bold text-gray-800 leading-tight flex-1 pr-2 break-words">{item.nome}</div>
                            <div className="font-bold text-gray-900 text-right min-w-[80px]">{currency(item.preco * item.quantidade)}</div>
                        </div>
                        <div className="flex items-center justify-between mt-2">
                            <div className="text-[11px] text-gray-500">{currency(item.preco)} un.</div>
                            <div className="flex items-center gap-2 md:gap-3 bg-gray-100 rounded-lg p-1">
                                <button onClick={(e)=>{e.stopPropagation(); alterarQuantidade(item.id, item.quantidade - 1)}} className="w-7 h-7 md:w-8 md:h-8 flex items-center justify-center bg-white rounded shadow text-gray-700 font-bold hover:text-red-500 text-lg">-</button>
                                <span className="font-bold text-sm md:text-base min-w-[20px] text-center">{item.quantidade}</span>
                                <button onClick={(e)=>{e.stopPropagation(); alterarQuantidade(item.id, item.quantidade + 1)}} className="w-7 h-7 md:w-8 md:h-8 flex items-center justify-center bg-white rounded shadow text-gray-700 font-bold hover:text-green-500 text-lg">+</button>
                            </div>
                        </div>
                    </div>
                ))}
                {carrinho.length===0 && (
                    <div className="h-full flex flex-col items-center justify-center text-gray-400 opacity-50 text-base py-10">
                        <span>Sua cesta está vazia</span>
                    </div>
                )}
             </div>

             <div className="p-4 bg-white border-t border-gray-200 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] flex-none">
                <div className="flex justify-between items-end mb-4">
                    <span className="text-gray-500 text-xs md:text-sm font-bold uppercase">Total a Pagar</span>
                    <span className="text-2xl md:text-4xl font-black text-gray-800 tabular-nums">{currency(totalCarrinho)}</span>
                </div>
                
                <button onClick={abrirComanda} disabled={carrinho.length === 0 || !caixaAberto} className="w-full py-2.5 mb-3 rounded-lg font-bold bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-200 transition disabled:opacity-50 text-xs uppercase tracking-wide">
                    Abrir Mesa / Comanda
                </button>
                
                <div className="flex gap-2 md:gap-3 h-12 md:h-14">
                    <button onClick={handleClickFiado} disabled={carrinho.length === 0 || !caixaAberto} className="flex-1 rounded-lg font-bold bg-orange-500 text-white shadow-md hover:bg-orange-600 transition disabled:opacity-50 text-sm md:text-base uppercase">
                        FIADO
                    </button>
                    <button onClick={handleClickPagar} disabled={carrinho.length === 0 || !caixaAberto} className="flex-[2] rounded-lg font-bold bg-green-600 text-white shadow-md hover:bg-green-700 transition disabled:opacity-50 text-base md:text-lg uppercase tracking-wide">
                        RECEBER
                    </button>
                </div>
             </div>
          </div>
        </div>

        {/* MODAL FIADO */}
        {modalFiadoOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden">
                    <div className="bg-orange-500 p-4">
                        <h3 className="text-white font-bold text-lg">Selecione o Cliente</h3>
                    </div>
                    <div className="p-6">
                        <select value={selectedClienteId} onChange={(e) => setSelectedClienteId(e.target.value)}
                            className="w-full p-3 border-2 border-orange-200 rounded-lg bg-orange-50 text-lg font-medium outline-none mb-6">
                            <option value="">-- Selecione um Cliente --</option>
                            {fiados.map(f => (<option key={f.id} value={f.id}>{f.nome}</option>))}
                        </select>
                        <div className="flex gap-3">
                            <button onClick={() => setModalFiadoOpen(false)} className="flex-1 py-3 border border-gray-300 rounded-lg text-gray-600 font-bold text-sm">Cancelar</button>
                            <button onClick={confirmarSelecaoFiado} className="flex-1 py-3 bg-orange-600 text-white rounded-lg font-bold text-sm">Confirmar</button>
                        </div>
                    </div>
                </div>
            </div>
        )}

        {/* MODAL PAGAMENTO */}
        {modalPagamentoOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
                    <div className="bg-green-600 p-5 flex justify-between items-center">
                        <h3 className="text-white font-bold text-lg">Finalizar Venda</h3>
                        <div className="text-green-100 font-bold text-xl">{currency(totalCarrinho)}</div>
                    </div>
                    <div className="p-6">
                        <div className="grid grid-cols-2 gap-3 mb-6">
                            <button onClick={()=>confirmarPagamento('Dinheiro')} className="p-4 border-2 border-gray-100 bg-gray-50 rounded-xl hover:border-green-500 flex flex-col items-center gap-2 transition group">
                                <span className="text-2xl">💵</span><span className="font-bold text-xs md:text-sm text-gray-700">Dinheiro</span>
                            </button>
                            <button onClick={()=>confirmarPagamento('Pix')} className="p-4 border-2 border-gray-100 bg-gray-50 rounded-xl hover:border-teal-500 flex flex-col items-center gap-2 transition group">
                                <span className="text-2xl">💠</span><span className="font-bold text-xs md:text-sm text-gray-700">Pix</span>
                            </button>
                            <button onClick={()=>confirmarPagamento('Débito')} className="p-4 border-2 border-gray-100 bg-gray-50 rounded-xl hover:border-blue-500 flex flex-col items-center gap-2 transition group">
                                <span className="text-2xl">💳</span><span className="font-bold text-xs md:text-sm text-gray-700">Débito</span>
                            </button>
                            <button onClick={()=>confirmarPagamento('Crédito')} className="p-4 border-2 border-gray-100 bg-gray-50 rounded-xl hover:border-purple-500 flex flex-col items-center gap-2 transition group">
                                <span className="text-2xl">💳</span><span className="font-bold text-xs md:text-sm text-gray-700">Crédito</span>
                            </button>
                        </div>
                        <button onClick={() => setModalPagamentoOpen(false)} className="w-full py-3 border border-gray-300 rounded-lg text-gray-500 font-bold text-sm">Cancelar</button>
                    </div>
                </div>
            </div>
        )}
      </div>
    );
  }
  
  /* ================= COMPONENTE: COMANDAS ================= */
  function ComandasView({ comandas, fecharComandaEGerarVenda, consumirItemPrePago, caixaAberto, produtos, adicionarItemComanda }){
  const [showAdd, setShowAdd] = useState(null);
  const [buscaProd, setBuscaProd] = useState('');
  
  const comandasAbertas = comandas.filter(c => c.status === 'Aberta');
  const produtosFiltrados = produtos.filter(p => p.nome.toLowerCase().includes(buscaProd.toLowerCase()) && p.estoque > 0);

  return (
    <div className="space-y-6 animate-fade-in w-full max-w-[1600px] mx-auto">
      <h2 className="text-2xl font-bold text-gray-800 border-b pb-3 flex items-center gap-3">
        <span className="text-3xl">💳</span> Comandas Abertas
      </h2>
      
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
        {comandasAbertas.map(c => (
          <div key={c.id} className="bg-white rounded-xl shadow-lg border-t-4 border-indigo-500 flex flex-col relative">
            <div className="p-4 border-b border-gray-100 bg-white sticky top-0 z-10">
                <div className="flex justify-between items-start">
                    <h3 className="font-bold text-lg text-gray-800">{c.nomeCliente}</h3>
                    <span className="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded">{c.mesaFixa}</span>
                </div>
                <div className="text-xs text-gray-400 mt-1">Total acumulado: <span className="font-bold text-gray-700">{currency(c.valorInicial)}</span></div>
            </div>
            
            <div className="p-4 flex-1 space-y-2 bg-gray-50/50 max-h-[300px] overflow-y-auto">
              <div className="flex justify-between items-center mb-2">
                <h4 className="font-bold text-xs text-gray-500 uppercase tracking-wide">Itens no Consumo</h4>
                <button 
                  onClick={() => setShowAdd(showAdd === c.id ? null : c.id)}
                  className="text-[10px] bg-indigo-600 text-white px-2 py-1 rounded-md font-bold hover:bg-indigo-700"
                >
                  {showAdd === c.id ? '✖ FECHAR' : '➕ ADICIONAR ITEM'}
                </button>
              </div>

              {showAdd === c.id && (
                <div className="bg-white p-2 border border-indigo-200 rounded-lg mb-4 shadow-inner">
                  <input 
                    placeholder="Buscar produto..." 
                    className="w-full p-2 text-sm border rounded mb-2 outline-none focus:border-indigo-500"
                    value={buscaProd}
                    onChange={(e) => setBuscaProd(e.target.value)}
                  />
                  <div className="max-h-32 overflow-y-auto">
                    {produtosFiltrados.slice(0, 5).map(p => (
                      <div 
                        key={p.id} 
                        onClick={() => { adicionarItemComanda(c.id, p); setBuscaProd(''); }}
                        className="p-2 text-xs hover:bg-indigo-50 cursor-pointer border-b flex justify-between items-center"
                      >
                        <span className="font-bold">{p.nome}</span>
                        <span className="text-green-600 font-bold">{currency(p.preco)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {c.itensPrePagos.map(item => (
                <div key={item.id} className="flex justify-between items-center py-2 border-b border-gray-200 last:border-0">
                  <div className="flex flex-col">
                    <span className="font-medium text-gray-700 text-sm">{item.nome}</span>
                    <span className="text-[10px] text-gray-400">Total: {item.quantidadeTotal} un.</span>
                  </div>
                  <div className="flex items-center gap-3">
                      <span className={`font-bold text-base ${item.quantidadeDisponivel > 0 ? 'text-green-600' : 'text-gray-300'}`}>
                        {item.quantidadeDisponivel}
                      </span>
                      {item.quantidadeDisponivel > 0 && (
                        <button 
                          onClick={() => { if(confirm('Lançar consumo de 1 unidade?')) consumirItemPrePago(c.id, item.id, 1); }} 
                          className="px-3 py-1 bg-white border border-green-500 text-green-600 hover:bg-green-50 rounded text-xs font-bold uppercase"
                        >
                          Usar
                        </button>
                      )}
                  </div>
                </div>
              ))}
            </div>
            
            <div className="p-4 bg-white border-t border-gray-200">
                <button 
                  onClick={() => fecharComandaEGerarVenda(c)} 
                  className="w-full py-3 bg-gray-800 text-white rounded-lg hover:bg-gray-900 transition font-semibold shadow text-sm uppercase"
                >
                  Fechar Conta {currency(c.valorInicial)}
                </button>
            </div>
          </div>
        ))}
        {comandasAbertas.length === 0 && (
          <div className="md:col-span-3 text-center text-gray-400 p-12 border-2 border-dashed border-gray-300 rounded-2xl bg-gray-50">
            Nenhuma comanda ou mesa aberta.
          </div>
        )}
      </div>
    </div>
  );
}

  /* ================= COMPONENTE: PRODUTOS ================= */
  function ProdutosView({produtos, user}){
    const [form, setForm] = useState({ id:null, nome:'', preco:'', estoque:'', categoria:'Outros' });
    const [search, setSearch] = useState('');
    const [filterCat, setFilterCat] = useState('');
    const [filterEstoque, setFilterEstoque] = useState('');
    const { addDoc, collection, updateDoc, doc, deleteDoc } = window.firebaseMethods;
    const db = window.db;

    async function submit(e){
      e.preventDefault();
      if(!form.nome || !form.preco || !form.estoque) return alert('Preencha os campos obrigatórios');
      const produtoData = { ...form, preco: Number(form.preco), estoque: Number(form.estoque), status: 'Normal' };
      
      if(form.id) {
          delete produtoData.id;
          await updateDoc(doc(db, "produtos", form.id), produtoData);
      } else {
          delete produtoData.id;
          await addDoc(collection(db, "produtos"), produtoData);
      }
      setForm({ id:null, nome:'', preco:'', estoque:'', categoria:'Outros' });
    }
    function editar(p){ setForm({...p, preco: String(p.preco), estoque: String(p.estoque)}); }
    async function excluir(p){ if(!confirm(`Excluir ${p.nome}?`)) return; await deleteDoc(doc(db, "produtos", p.id)); }

    const produtosFiltrados = produtos.filter(p => {
        const matchName = p.nome.toLowerCase().includes(search.toLowerCase());
        const matchCat = filterCat === '' || p.categoria === filterCat;
        
        let matchEstoque = true;
        if (filterEstoque === 'baixo') matchEstoque = p.estoque > 0 && p.estoque < 10;
        else if (filterEstoque === 'zerado') matchEstoque = p.estoque === 0;
        else if (filterEstoque === 'normal') matchEstoque = p.estoque >= 10;
        
        return matchName && matchCat && matchEstoque;
    });

    if (user.role !== 'admin') return <div className="p-6 bg-yellow-50 text-yellow-800 m-4 rounded-xl text-center font-bold">Acesso restrito a administradores.</div>;

    return (
      <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 animate-fade-in w-full max-w-[1600px] mx-auto">
        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit">
          <h3 className="font-bold text-lg mb-4 text-gray-800 border-b pb-2">{form.id ? '✏️ Editar' : '✨ Novo'} Produto</h3>
          <form onSubmit={submit} className="space-y-4">
            <div>
                <label className="text-xs font-bold text-gray-500 uppercase block mb-1">Nome do Produto</label>
                <input value={form.nome} onChange={e=>setForm({...form, nome:e.target.value})} className="w-full p-2 border rounded-lg mt-1 outline-none focus:border-indigo-500 transition h-10 text-base" required />
            </div>
            <div className="grid grid-cols-2 gap-4">
                <div>
